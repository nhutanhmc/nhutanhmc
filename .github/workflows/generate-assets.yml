name: Generate Profile Assets

on:
  push:
    branches:
      - main
  schedule:
    - cron: "0 18 * * *" # Chạy lúc 01:00 AM giờ VN hàng ngày
  workflow_dispatch: # Cho phép kích hoạt thủ công

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Generate 3D contributions
        uses: yoshi389111/github-profile-3d-contrib@0.7.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: ${{ github.repository_owner }}

      - name: Generate Snake SVG
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=#00b4d8&color_dots=#161b22,#03045e,#0077b6,#0096c7,#90e0ef
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=#00b4d8&color_dots=#161b22,#03045e,#0077b6,#0096c7,#90e0ef
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit & Push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add profile-3d-contrib/ dist/
          git commit -m "chore: regenerate profile assets (3D & snake)" || exit 0
          git push
