<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 480" width="100%" height="100%">
  <defs>
    <!-- Intense Glow Filters -->
    <filter id="glow-cyan" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5" result="blur1" />
      <feGaussianBlur stdDeviation="10" result="blur2" />
      <feMerge>
        <feMergeNode in="blur2" />
        <feMergeNode in="blur1" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="glow-blue" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur1" />
      <feGaussianBlur stdDeviation="12" result="blur2" />
      <feMerge>
        <feMergeNode in="blur2" />
        <feMergeNode in="blur1" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Background light source -->
    <radialGradient id="bg-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0a2046" stop-opacity="0.65"/>
      <stop offset="100%" stop-color="#010205" stop-opacity="0"/>
    </radialGradient>
    
    <!-- Central Core Energy Glow -->
    <radialGradient id="core-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00f5d4" stop-opacity="0.9"/>
      <stop offset="40%" stop-color="#0077b6" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#020617" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <style>
    /* Keyframe Animations */
    @keyframes spin-cw {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    @keyframes spin-ccw {
      0% { transform: rotate(360deg); }
      100% { transform: rotate(0deg); }
    }
    @keyframes pulse-core {
      0%, 100% { transform: scale(1); opacity: 0.9; }
      50% { transform: scale(1.15); opacity: 1; filter: drop-shadow(0 0 15px #00b4d8); }
    }
    @keyframes float-hologram {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-10px); }
      100% { transform: translateY(0px); }
    }
    @keyframes dash-flow {
      to { stroke-dashoffset: -40; }
    }
    @keyframes scan-radar {
      0% { opacity: 0.2; }
      50% { opacity: 0.8; }
      100% { opacity: 0.2; }
    }

    /* Animation Classes */
    .spin-cw { animation: spin-cw 30s linear infinite; transform-origin: 500px 240px; }
    .spin-ccw { animation: spin-ccw 40s linear infinite; transform-origin: 500px 240px; }
    .spin-cw-fast { animation: spin-cw 20s linear infinite; transform-origin: 500px 240px; }
    
    /* Counter-rotations to keep orbiting nodes upright */
    .counter-spin-cw { animation: spin-ccw 30s linear infinite; }
    .counter-spin-ccw { animation: spin-cw 40s linear infinite; }
    .counter-spin-cw-fast { animation: spin-ccw 20s linear infinite; }
    
    .pulse-core { animation: pulse-core 3.5s ease-in-out infinite; transform-origin: 500px 240px; }
    .float-hologram { animation: float-hologram 6s ease-in-out infinite; }
    .orbit-line { stroke-dasharray: 10 8; animation: dash-flow 12s linear infinite; }
    .radar-sweep { animation: scan-radar 3s infinite ease-in-out; }

    /* Interactive Icon Styles */
    .tech-node { cursor: pointer; transition: all 0.3s ease; }
    .tech-node:hover { filter: brightness(1.3) drop-shadow(0 0 10px #00f5d4); }
  </style>

  <!-- Deep Blue Space Canvas -->
  <rect width="100%" height="100%" fill="#010205" rx="16" stroke="#0f172a" stroke-width="2.5" />
  <circle cx="500" cy="240" r="420" fill="url(#bg-glow)" />

  <!-- === HUD GRID BACKGROUND GRAPHICS === -->
  <g stroke="#ffffff" stroke-opacity="0.04" stroke-width="1">
    <line x1="50" y1="240" x2="950" y2="240" />
    <line x1="500" y1="30" x2="500" y2="450" />
    <circle cx="500" cy="240" r="210" fill="none" />
    <circle cx="500" cy="240" r="340" fill="none" />
    <!-- Diagonal ticks -->
    <line x1="200" y1="60" x2="800" y2="420" />
    <line x1="200" y1="420" x2="800" y2="60" />
  </g>

  <!-- Telemetry HUD indicators on sides -->
  <g font-family="monospace" font-size="9" fill="#0077b6" font-weight="bold">
    <text x="35" y="55">TRACKING: LOCK_ON</text>
    <text x="35" y="70">SYS_LATENCY: 12ms</text>
    <text x="35" y="85">ORBIT_RATIO: 1.618</text>
    
    <text x="965" y="55" text-anchor="end">SCAN_LAYER: [12/12]</text>
    <text x="965" y="70" text-anchor="end">SIGNAL_STRENGTH: MAX</text>
    <text x="965" y="85" text-anchor="end">LINK_RATE: 1024 GB/S</text>
  </g>

  <!-- Top and Bottom Title Overlays -->
  <text x="500" y="45" font-family="monospace" font-size="12" font-weight="bold" fill="#00f5d4" text-anchor="middle" filter="url(#glow-cyan)" class="radar-sweep">3D HOLO_STACK MATRIX BLUEPRINT</text>

  <!-- 3D Perspective Projection Container (Y scale compressed to simulate depth) -->
  <g transform="translate(0, 0) scale(1, 0.42)" class="float-hologram">
    
    <!-- === OUTER ORBIT (AWS, Docker, Firebase, Supabase) === -->
    <ellipse cx="500" cy="571" rx="420" ry="420" fill="none" stroke="#00b4d8" stroke-width="1.5" stroke-opacity="0.4" class="orbit-line" />
    
    <g class="spin-ccw">
      <!-- AWS -->
      <g transform="translate(500, 151)">
        <g class="counter-spin-ccw tech-node" transform="scale(1, 2.38)">
          <rect x="-24" y="-24" width="48" height="48" rx="8" fill="#02081a" stroke="#0077b6" stroke-width="1.5" filter="url(#glow-blue)" />
          <!-- Cloud and Arrow -->
          <path d="M-10,4 C-14,4 -15,1 -13,-2 C-12,-4 -9,-5 -8,-5 C-7,-9 -3,-10 1,-8 C4,-6 5,-3 5,-3 C7,-5 10,-4 11,-1 C13,1 11,5 8,5 Z" fill="none" stroke="#00f5d4" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />
          <path d="M-14,10 L14,10 M-8,13 Q0,17 8,13" fill="none" stroke="#00b4d8" stroke-width="1.5" stroke-linecap="round" />
        </g>
      </g>

      <!-- Docker -->
      <g transform="translate(920, 571)">
        <g class="counter-spin-ccw tech-node" transform="scale(1, 2.38)">
          <rect x="-24" y="-24" width="48" height="48" rx="8" fill="#02081a" stroke="#0077b6" stroke-width="1.5" filter="url(#glow-blue)" />
          <!-- Whale Representation -->
          <rect x="-9" y="-9" width="5" height="4" fill="none" stroke="#00f5d4" stroke-width="1.5"/>
          <rect x="-2" y="-9" width="5" height="4" fill="none" stroke="#00f5d4" stroke-width="1.5"/>
          <rect x="5" y="-9" width="5" height="4" fill="none" stroke="#00f5d4" stroke-width="1.5"/>
          <path d="M-15,3 C-10,3 -7,0 2,0 C7,0 11,3 13,-1 C13,-3 10,-4 9,-4 C6,-4 5,-1 2,-1 C-3,-1 -6,-4 -12,-4 C-15,-4 -16,-2 -16,0 Z" fill="none" stroke="#00f5d4" stroke-width="1.5"/>
        </g>
      </g>

      <!-- Firebase -->
      <g transform="translate(500, 991)">
        <g class="counter-spin-ccw tech-node" transform="scale(1, 2.38)">
          <rect x="-24" y="-24" width="48" height="48" rx="8" fill="#02081a" stroke="#0077b6" stroke-width="1.5" filter="url(#glow-blue)" />
          <!-- Flame -->
          <path d="M-10,10 L8,10 L-5,-11 L-11,2 Z" fill="none" stroke="#00f5d4" stroke-width="1.5" stroke-linejoin="round"/>
          <path d="M-5,2 L5,10 L0,-4 Z" fill="none" stroke="#00b4d8" stroke-width="1" stroke-linejoin="round"/>
        </g>
      </g>

      <!-- Supabase -->
      <g transform="translate(80, 571)">
        <g class="counter-spin-ccw tech-node" transform="scale(1, 2.38)">
          <rect x="-24" y="-24" width="48" height="48" rx="8" fill="#02081a" stroke="#0077b6" stroke-width="1.5" filter="url(#glow-blue)" />
          <!-- Lightning Bolts -->
          <path d="-9,-11 L5,-11 L-5,1 L7,1 L-5,12 L-1,0 L-9,0 Z" fill="none" stroke="#00f5d4" stroke-width="1.8" stroke-linejoin="round"/>
        </g>
      </g>
    </g>

    <!-- === MIDDLE ORBIT (React, Next.js, Vue, Flutter) === -->
    <ellipse cx="500" cy="571" rx="270" ry="270" fill="none" stroke="#00f5d4" stroke-width="1.5" stroke-opacity="0.4" class="orbit-line" />
    
    <g class="spin-cw">
      <!-- React -->
      <g transform="translate(500, 301)">
        <g class="counter-spin-cw tech-node" transform="scale(1, 2.38)">
          <rect x="-24" y="-24" width="48" height="48" rx="8" fill="#02081a" stroke="#00f5d4" stroke-width="1.5" filter="url(#glow-cyan)" />
          <!-- Atom Orbitals -->
          <ellipse cx="0" cy="0" rx="14" ry="5.5" fill="none" stroke="#00f5d4" stroke-width="1.5" transform="rotate(30)" />
          <ellipse cx="0" cy="0" rx="14" ry="5.5" fill="none" stroke="#00f5d4" stroke-width="1.5" transform="rotate(90)" />
          <ellipse cx="0" cy="0" rx="14" ry="5.5" fill="none" stroke="#00f5d4" stroke-width="1.5" transform="rotate(150)" />
          <circle cx="0" cy="0" r="2.5" fill="#ffffff" filter="url(#glow-cyan)" />
        </g>
      </g>

      <!-- Next.js -->
      <g transform="translate(770, 571)">
        <g class="counter-spin-cw tech-node" transform="scale(1, 2.38)">
          <rect x="-24" y="-24" width="48" height="48" rx="8" fill="#02081a" stroke="#00f5d4" stroke-width="1.5" filter="url(#glow-cyan)" />
          <text x="0" y="6" font-family="'Courier New', monospace" font-size="18" font-weight="bold" fill="#00f5d4" text-anchor="middle">NXT</text>
        </g>
      </g>

      <!-- Vue.js -->
      <g transform="translate(500, 841)">
        <g class="counter-spin-cw tech-node" transform="scale(1, 2.38)">
          <rect x="-24" y="-24" width="48" height="48" rx="8" fill="#02081a" stroke="#00f5d4" stroke-width="1.5" filter="url(#glow-cyan)" />
          <!-- Triangle Vector -->
          <polygon points="-11,-8 0,11 11,-8 7,-8 0,3 -7,-8" fill="none" stroke="#00f5d4" stroke-width="1.5" />
        </g>
      </g>

      <!-- Flutter -->
      <g transform="translate(230, 571)">
        <g class="counter-spin-cw tech-node" transform="scale(1, 2.38)">
          <rect x="-24" y="-24" width="48" height="48" rx="8" fill="#02081a" stroke="#00f5d4" stroke-width="1.5" filter="url(#glow-cyan)" />
          <!-- Origami Fold Vector -->
          <path d="M-8,-9 L4,3 L-8,15 M2,-9 L12,1 L4,9" fill="none" stroke="#00f5d4" stroke-width="2" stroke-linecap="round" />
        </g>
      </g>
    </g>

    <!-- === INNER ORBIT (JS, TS, Node, Dart) === -->
    <ellipse cx="500" cy="571" rx="140" ry="140" fill="none" stroke="#4f46e5" stroke-width="1.5" stroke-opacity="0.5" class="orbit-line" />
    
    <g class="spin-cw-fast">
      <!-- TypeScript -->
      <g transform="translate(500, 431)">
        <g class="counter-spin-cw-fast tech-node" transform="scale(1, 2.38)">
          <rect x="-18" y="-18" width="36" height="36" rx="6" fill="#02081a" stroke="#4f46e5" stroke-width="1.5" filter="url(#glow-blue)" />
          <text x="0" y="5" font-family="'Courier New', monospace" font-size="12" font-weight="bold" fill="#00b4d8" text-anchor="middle">TS</text>
        </g>
      </g>

      <!-- JavaScript -->
      <g transform="translate(640, 571)">
        <g class="counter-spin-cw-fast tech-node" transform="scale(1, 2.38)">
          <rect x="-18" y="-18" width="36" height="36" rx="6" fill="#02081a" stroke="#4f46e5" stroke-width="1.5" filter="url(#glow-blue)" />
          <text x="0" y="5" font-family="'Courier New', monospace" font-size="12" font-weight="bold" fill="#00b4d8" text-anchor="middle">JS</text>
        </g>
      </g>

      <!-- Node.js -->
      <g transform="translate(500, 711)">
        <g class="counter-spin-cw-fast tech-node" transform="scale(1, 2.38)">
          <rect x="-18" y="-18" width="36" height="36" rx="6" fill="#02081a" stroke="#4f46e5" stroke-width="1.5" filter="url(#glow-blue)" />
          <text x="0" y="4" font-family="'Courier New', monospace" font-size="10" font-weight="bold" fill="#00b4d8" text-anchor="middle">NODE</text>
        </g>
      </g>

      <!-- Dart -->
      <g transform="translate(360, 571)">
        <g class="counter-spin-cw-fast tech-node" transform="scale(1, 2.38)">
          <rect x="-18" y="-18" width="36" height="36" rx="6" fill="#02081a" stroke="#4f46e5" stroke-width="1.5" filter="url(#glow-blue)" />
          <!-- Diamond shape -->
          <polygon points="0,-8 8,0 0,8 -8,0" fill="none" stroke="#00b4d8" stroke-width="1.5" />
        </g>
      </g>
    </g>

    <!-- === CENTRAL NODE (REACTOR CORE / HUB) === -->
    <!-- Spinning HUD indicators -->
    <ellipse cx="500" cy="571" rx="60" ry="60" fill="none" stroke="#00f5d4" stroke-width="2" stroke-dasharray="12 8" class="spin-cw" filter="url(#glow-cyan)" />
    <ellipse cx="500" cy="571" rx="72" ry="72" fill="none" stroke="#0077b6" stroke-width="1.5" stroke-opacity="0.7" stroke-dasharray="4 12" class="spin-ccw" />
    
    <!-- Central Pulsing Glow Core -->
    <g class="pulse-core">
      <circle cx="500" cy="571" r="30" fill="url(#core-glow)" />
      <circle cx="500" cy="571" r="14" fill="#ffffff" filter="url(#glow-cyan)" />
      
      <!-- Vector details -->
      <line x1="500" y1="546" x2="500" y2="596" stroke="#00f5d4" stroke-width="1.5" />
      <line x1="475" y1="571" x2="525" y2="571" stroke="#00f5d4" stroke-width="1.5" />
    </g>

  </g>
</svg>
