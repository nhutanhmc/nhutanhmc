<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 280" width="100%" height="100%">
  <defs>
    <!-- Intense Glow Filters -->
    <filter id="glow-cyan" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3.5" result="blur1" />
      <feGaussianBlur stdDeviation="7" result="blur2" />
      <feMerge>
        <feMergeNode in="blur2" />
        <feMergeNode in="blur1" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="glow-blue" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur1" />
      <feGaussianBlur stdDeviation="8" result="blur2" />
      <feMerge>
        <feMergeNode in="blur2" />
        <feMergeNode in="blur1" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Translucent Terminal Glass Gradient -->
    <linearGradient id="terminal-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#030718" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#010309" stop-opacity="0.98"/>
    </linearGradient>
  </defs>

  <style>
    /* CSS Keyframe Animations */
    @keyframes blink {
      0%, 100% { opacity: 0.2; }
      50% { opacity: 1; }
    }
    @keyframes pulse-core {
      0%, 100% { transform: scale(1); opacity: 0.8; }
      50% { transform: scale(1.1); opacity: 1; filter: drop-shadow(0 0 8px #00f5d4); }
    }
    @keyframes circuit-flow {
      0% { stroke-dashoffset: 0; }
      100% { stroke-dashoffset: -20; }
    }

    /* Animation Classes */
    .blink { animation: blink 1.5s infinite ease-in-out; }
    .pulse-core { transform-origin: 360px 145px; animation: pulse-core 3s infinite ease-in-out; }
    .circuit-link { stroke-dasharray: 4 6; animation: circuit-flow 1.5s linear infinite; }

    /* Typography styles */
    .term-text { font-family: 'Courier New', Courier, monospace; font-size: 11px; font-weight: bold; fill: #ffffff; }
    .term-label { fill: #00b4d8; }
    .term-val { fill: #8fa0c5; }
    .term-title { font-family: 'Courier New', monospace; font-size: 10px; font-weight: bold; fill: #475569; letter-spacing: 1px; }
  </style>

  <!-- Terminal Window Chrome -->
  <rect width="480" height="280" rx="10" fill="url(#terminal-grad)" stroke="#0077b6" stroke-width="1.5" stroke-opacity="0.7" filter="url(#glow-blue)" />

  <!-- Top Bar Area -->
  <path d="M0,12 Q0,0 12,0 L468,0 Q480,0 480,12 L480,30 L0,30 Z" fill="#010410" />
  <circle cx="20" cy="15" r="4.5" fill="#ef4444" />
  <circle cx="33" cy="15" r="4.5" fill="#eab308" />
  <circle cx="46" cy="15" r="4.5" fill="#22c55e" />
  <text x="240" y="19" class="term-title" text-anchor="middle">nhutanhmc@xavia-deck:~</text>
  <circle cx="460" cy="15" r="3" fill="#00f5d4" class="blink" />
  
  <line x1="0" y1="30" x2="480" y2="30" stroke="#0077b6" stroke-width="1" stroke-opacity="0.4" />

  <!-- Corner Brackets overlay -->
  <path d="M10,40 L10,36 L14,36" fill="none" stroke="#00f5d4" stroke-width="1.5" stroke-opacity="0.8" filter="url(#glow-cyan)" />
  <path d="M470,40 L470,36 L466,36" fill="none" stroke="#00f5d4" stroke-width="1.5" stroke-opacity="0.8" filter="url(#glow-cyan)" />
  <path d="M10,268 L10,272 L14,272" fill="none" stroke="#00f5d4" stroke-width="1.5" stroke-opacity="0.8" filter="url(#glow-cyan)" />
  <path d="M470,268 L470,272 L466,272" fill="none" stroke="#00f5d4" stroke-width="1.5" stroke-opacity="0.8" filter="url(#glow-cyan)" />

  <!-- === LEFT HALF: SYSTEM SPECIFICATIONS === -->
  <g transform="translate(20, 50)">
    <text x="0" y="15" class="term-text" fill="#22c55e">nhutanhmc@xavia-deck</text>
    <text x="0" y="27" class="term-text" fill="#0077b6">--------------------</text>
    
    <text x="0" y="45" class="term-text"><tspan class="term-label">OS: </tspan><tspan class="term-val">Arch CyberLinux x86_64</tspan></text>
    <text x="0" y="62" class="term-text"><tspan class="term-label">Host: </tspan><tspan class="term-val">Xavia CyberDeck v3.5</tspan></text>
    <text x="0" y="79" class="term-text"><tspan class="term-label">Kernel: </tspan><tspan class="term-val">6.9.2-cyber-core</tspan></text>
    <text x="0" y="96" class="term-text"><tspan class="term-label">Uptime: </tspan><tspan class="term-val">24 years 🌏</tspan></text>
    <text x="0" y="113" class="term-text"><tspan class="term-label">Shell: </tspan><tspan class="term-val">zsh 5.9</tspan></text>
    <text x="0" y="130" class="term-text"><tspan class="term-label">DE: </tspan><tspan class="term-val">Hyprland (Neon-Cyan)</tspan></text>
    <text x="0" y="147" class="term-text"><tspan class="term-label">CPU: </tspan><tspan class="term-val">Cognitive Engine v3 @ 5.8GHz</tspan></text>
    <text x="0" y="164" class="term-text"><tspan class="term-label">RAM: </tspan><tspan class="term-val">64 GB / LPDDR5</tspan></text>
    <text x="0" y="181" class="term-text"><tspan class="term-label">Focus: </tspan><tspan class="term-val">AI Integration / Web / Mobile</tspan></text>
    <text x="0" y="198" class="term-text"><tspan class="term-label">Directive: </tspan><tspan class="term-val" fill="#00f5d4" filter="url(#glow-cyan)">Clean code, peak performance ✨</tspan></text>
  </g>

  <!-- Vertical partition line -->
  <line x1="290" y1="40" x2="290" y2="265" stroke="#0077b6" stroke-width="1" stroke-opacity="0.3" stroke-dasharray="4 4" />

  <!-- === RIGHT HALF: GLOWING CPU CHIP & CIRCUITS === -->
  <!-- Circuit Paths -->
  <g fill="none" stroke="#0077b6" stroke-width="1.5" stroke-opacity="0.7">
    <!-- Top-left connector -->
    <path d="M 310,75 L 330,95 L 330,115" />
    <circle cx="310" cy="75" r="2" fill="#0077b6" />
    
    <!-- Top connector -->
    <path d="M 360,65 L 360,115" />
    <circle cx="360" cy="65" r="2" fill="#0077b6" />

    <!-- Top-right connector -->
    <path d="M 410,75 L 390,95 L 390,115" />
    <circle cx="410" cy="75" r="2" fill="#0077b6" />

    <!-- Bottom-left connector -->
    <path d="M 310,215 L 330,195 L 330,175" />
    <circle cx="310" cy="215" r="2" fill="#0077b6" />

    <!-- Bottom connector -->
    <path d="M 360,225 L 360,175" />
    <circle cx="360" cy="225" r="2" fill="#0077b6" />

    <!-- Bottom-right connector -->
    <path d="M 410,215 L 390,195 L 390,175" />
    <circle cx="410" cy="215" r="2" fill="#0077b6" />

    <!-- Right connector -->
    <path d="M 440,145 L 390,145" />
    <circle cx="440" cy="145" r="2" fill="#0077b6" />
  </g>

  <!-- Glowing Flowing Circuits -->
  <g fill="none" stroke="#00f5d4" stroke-width="2" class="circuit-link" filter="url(#glow-cyan)">
    <path d="M 310,75 L 330,95 L 330,115" />
    <path d="M 360,65 L 360,115" />
    <path d="M 410,75 L 390,95 L 390,115" />
    <path d="M 310,215 L 330,195 L 330,175" />
    <path d="M 360,225 L 360,175" />
    <path d="M 410,215 L 390,195 L 390,175" />
    <path d="M 440,145 L 390,145" />
  </g>

  <!-- Central Processor Base -->
  <rect x="330" y="115" width="60" height="60" rx="6" fill="#020516" stroke="#0077b6" stroke-width="2" filter="url(#glow-blue)" />

  <!-- Processor Silicon Core -->
  <g class="pulse-core">
    <rect x="340" y="125" width="40" height="40" rx="4" fill="#040d2d" stroke="#00f5d4" stroke-width="1.5" />
    <circle cx="360" cy="145" r="10" fill="none" stroke="#00f5d4" stroke-width="1.5" stroke-dasharray="3 3" />
    <circle cx="360" cy="145" r="4" fill="#ffffff" filter="url(#glow-cyan)" />
  </g>

  <!-- Diagnostic Stats labels -->
  <text x="360" y="195" font-family="monospace" font-size="8" fill="#00f5d4" font-weight="bold" text-anchor="middle" filter="url(#glow-cyan)">CORE: ACTIVE</text>
  <text x="360" y="248" font-family="monospace" font-size="8" fill="#ff2a6d" font-weight="bold" text-anchor="middle" class="blink">LOCK: SECURED</text>
</svg>
