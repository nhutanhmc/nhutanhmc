<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 420" width="100%" height="100%">
  <defs>
    <!-- Intense Glow Filters -->
    <filter id="glow-cyan" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur1" />
      <feGaussianBlur stdDeviation="8" result="blur2" />
      <feMerge>
        <feMergeNode in="blur2" />
        <feMergeNode in="blur1" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="glow-blue" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="5" result="blur1" />
      <feGaussianBlur stdDeviation="10" result="blur2" />
      <feMerge>
        <feMergeNode in="blur2" />
        <feMergeNode in="blur1" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Linear Gradients for Dashboard Cards -->
    <linearGradient id="card-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#02081a" stop-opacity="0.95"/>
      <stop offset="50%" stop-color="#01030a" stop-opacity="0.97"/>
      <stop offset="100%" stop-color="#040e2d" stop-opacity="0.95"/>
    </linearGradient>

    <!-- Clip Paths for Terminal Logs and Sonar Graph -->
    <clipPath id="logs-clip">
      <rect x="0" y="0" width="290" height="175" />
    </clipPath>
  </defs>

  <style>
    /* CSS Keyframe Animations */
    @keyframes blink {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 1; filter: drop-shadow(0 0 8px #00f5d4); }
    }
    @keyframes cursor-blink {
      0%, 100% { opacity: 0; }
      50% { opacity: 1; }
    }
    @keyframes rotate-cw {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    @keyframes rotate-ccw {
      0% { transform: rotate(360deg); }
      100% { transform: rotate(0deg); }
    }
    @keyframes laser-sweep {
      0% { transform: translateY(0px); opacity: 0; }
      10% { opacity: 0.8; }
      90% { opacity: 0.8; }
      100% { transform: translateY(240px); opacity: 0; }
    }
    @keyframes log-scroll {
      0% { transform: translateY(0px); }
      100% { transform: translateY(-185px); }
    }
    @keyframes spin3d {
      0% { transform: rotateX(30deg) rotateY(0deg); }
      100% { transform: rotateX(30deg) rotateY(360deg); }
    }
    @keyframes radar-pulse {
      0% { r: 5px; opacity: 1; }
      100% { r: 50px; opacity: 0; }
    }
    @keyframes float-particles {
      0% { transform: translateY(0px) translateX(0px); opacity: 0.1; }
      50% { transform: translateY(-30px) translateX(10px); opacity: 0.7; }
      100% { transform: translateY(-60px) translateX(-5px); opacity: 0; }
    }
    @keyframes glitch-text {
      0%, 100% { transform: translate(0); }
      20% { transform: translate(-2px, 1px); }
      40% { transform: translate(-1px, -1px); }
      60% { transform: translate(2px, -1px); }
      80% { transform: translate(1px, 2px); }
    }
    @keyframes bar-bounce-1 {
      0%, 100% { height: 15px; y: 205px; }
      50% { height: 60px; y: 160px; }
    }
    @keyframes bar-bounce-2 {
      0%, 100% { height: 45px; y: 175px; }
      50% { height: 20px; y: 200px; }
    }
    @keyframes bar-bounce-3 {
      0%, 100% { height: 25px; y: 195px; }
      50% { height: 75px; y: 145px; }
    }
    @keyframes bar-bounce-4 {
      0%, 100% { height: 50px; y: 170px; }
      50% { height: 35px; y: 185px; }
    }

    /* Animation Application Classes */
    .blink { animation: blink 2s infinite ease-in-out; }
    .cursor { animation: cursor-blink 1s infinite; fill: #00f5d4; }
    .rotate-cw { transform-origin: 500px 180px; animation: rotate-cw 20s linear infinite; }
    .rotate-ccw { transform-origin: 500px 180px; animation: rotate-ccw 12s linear infinite; }
    .laser-sweep { animation: laser-sweep 4s infinite linear; stroke: #00f5d4; filter: url(#glow-cyan); }
    .log-scroller { animation: log-scroll 10s linear infinite; }
    .glitch { animation: glitch-text 3s infinite steps(2); }
    
    .radar-sweep-line { transform-origin: 720px 160px; animation: rotate-cw 4s linear infinite; }
    .radar-ping { transform-origin: 720px 160px; animation: radar-pulse 3s infinite cubic-bezier(0.1, 0.8, 0.3, 1); }
    
    .hologram-globe {
      transform-style: preserve-3d;
      transform-origin: 500px 180px;
      animation: spin3d 10s linear infinite;
    }
    
    /* System Diagnostic Bars */
    .diag-bar-1 { animation: bar-bounce-1 1.2s infinite ease-in-out; }
    .diag-bar-2 { animation: bar-bounce-2 0.8s infinite ease-in-out; }
    .diag-bar-3 { animation: bar-bounce-3 1.5s infinite ease-in-out; }
    .diag-bar-4 { animation: bar-bounce-4 1s infinite ease-in-out; }

    /* Particles floating up from horizon */
    .spark { fill: #00f5d4; filter: url(#glow-cyan); animation: float-particles 5s infinite linear; }
    .sp-1 { transform-origin: 480px 320px; animation-delay: 0s; }
    .sp-2 { transform-origin: 520px 320px; animation-delay: 1.5s; }
    .sp-3 { transform-origin: 500px 320px; animation-delay: 3s; }

    /* Typography */
    .log-line { font-family: 'Courier New', Courier, monospace; font-size: 11px; fill: #8fa0c5; }
    .tech-header { font-family: 'Courier New', monospace; font-size: 11px; font-weight: bold; fill: #475569; letter-spacing: 1px; }
  </style>

  <!-- Background Base Canvas -->
  <rect width="1000" height="420" rx="16" fill="#010205" stroke="#0f172a" stroke-width="2.5" />

  <!-- === 3D GRID FLOOR (Moving Horizon Effect) === -->
  <g>
    <!-- Horizon clipping region -->
    <clipPath id="grid-clip">
      <polygon points="0,320 1000,320 1000,420 0,420" />
    </clipPath>
    
    <g clip-path="url(#grid-clip)">
      <!-- Ground fill -->
      <rect y="320" width="1000" height="100" fill="#01030a" />
      
      <!-- Perspective lines radiating from horizon center (500, 320) -->
      <g stroke="#0077b6" stroke-opacity="0.3" stroke-width="1.5">
        <line x1="-400" y1="420" x2="500" y2="320" />
        <line x1="-200" y1="420" x2="500" y2="320" />
        <line x1="0" y1="420" x2="500" y2="320" />
        <line x1="150" y1="420" x2="500" y2="320" />
        <line x1="300" y1="420" x2="500" y2="320" />
        <line x1="420" y1="420" x2="500" y2="320" />
        <line x1="500" y1="420" x2="500" y2="320" />
        <line x1="580" y1="420" x2="500" y2="320" />
        <line x1="700" y1="420" x2="500" y2="320" />
        <line x1="850" y1="420" x2="500" y2="320" />
        <line x1="1000" y1="420" x2="500" y2="320" />
        <line x1="1200" y1="420" x2="500" y2="320" />
        <line x1="1400" y1="420" x2="500" y2="320" />
      </g>
      
      <!-- Grid Horizontal Lines -->
      <g stroke="#00b4d8" stroke-opacity="0.4" stroke-width="1">
        <line x1="0" y1="322" x2="1000" y2="322" />
        <line x1="0" y1="326" x2="1000" y2="326" />
        <line x1="0" y1="334" x2="1000" y2="334" />
        <line x1="0" y1="346" x2="1000" y2="346" />
        <line x1="0" y1="363" x2="1000" y2="363" />
        <line x1="0" y1="387" x2="1000" y2="387" />
        <line x1="0" y1="418" x2="1000" y2="418" />
      </g>
    </g>
    
    <!-- Neon horizon sweep laser bar -->
    <line x1="0" y1="320" x2="1000" y2="320" stroke="#00f5d4" stroke-width="2" stroke-opacity="0.9" filter="url(#glow-cyan)" />
  </g>

  <!-- Glowing reactor sparks/particles floating upwards -->
  <circle cx="490" cy="320" r="1.5" class="spark sp-1" />
  <circle cx="515" cy="320" r="2" class="spark sp-2" />
  <circle cx="503" cy="320" r="1" class="spark sp-3" />

  <!-- === LEFT TERMINAL PANEL (COMPILE LOG WATERFALL) === -->
  <g id="left-panel">
    <!-- Semi-transparent glass border and card -->
    <rect x="25" y="30" width="320" height="260" rx="10" fill="url(#card-grad)" stroke="#0077b6" stroke-width="1.5" stroke-opacity="0.6" filter="url(#glow-blue)" />
    
    <!-- Window OS Header -->
    <circle cx="45" cy="45" r="4.5" fill="#ef4444" />
    <circle cx="58" cy="45" r="4.5" fill="#eab308" />
    <circle cx="71" cy="45" r="4.5" fill="#22c55e" />
    <text x="185" y="49" class="tech-header" text-anchor="middle">XAVIA_COMPILE.log</text>
    <circle cx="325" cy="45" r="3.5" fill="#00f5d4" class="blink" />
    
    <line x1="25" y1="58" x2="345" y2="58" stroke="#0077b6" stroke-width="1" stroke-opacity="0.5" />

    <!-- Scanning line sweep effect -->
    <line x1="26" y1="59" x2="344" y2="59" stroke-width="1.5" class="laser-sweep" />

    <!-- Corner Bracket Aesthetics -->
    <path d="M32,70 L32,64 L38,64" fill="none" stroke="#00f5d4" stroke-width="1.5" stroke-opacity="0.8" filter="url(#glow-cyan)" />
    <path d="M338,70 L338,64 L332,64" fill="none" stroke="#00f5d4" stroke-width="1.5" stroke-opacity="0.8" filter="url(#glow-cyan)" />
    <path d="M32,250 L32,256 L38,256" fill="none" stroke="#00f5d4" stroke-width="1.5" stroke-opacity="0.8" filter="url(#glow-cyan)" />
    <path d="M338,250 L338,256 L332,256" fill="none" stroke="#00f5d4" stroke-width="1.5" stroke-opacity="0.8" filter="url(#glow-cyan)" />

    <!-- Scrollable logs waterfall -->
    <g transform="translate(40, 75)">
      <g clip-path="url(#logs-clip)">
        <g class="log-scroller">
          <!-- Segment A -->
          <text x="0" y="12" class="log-line" fill="#00f5d4" filter="url(#glow-cyan)">[SYS] START NEURAL CORE ENGINE...</text>
          <text x="0" y="27" class="log-line">[SYS] INITIALIZE COGNITION: <tspan fill="#22c55e">OK</tspan></text>
          <text x="0" y="42" class="log-line">[RUN] INTEGRATING FLUTTER MODULES</text>
          <text x="0" y="57" class="log-line">[RUN] COMPILING NEXT.JS ROOT ROUTER</text>
          <text x="0" y="72" class="log-line">[RUN] MOUNTING POSTGRESQL DB POOL</text>
          <text x="0" y="87" class="log-line">[SYS] PORT TUNNEL INSTANTIATED [SSL]</text>
          <text x="0" y="102" class="log-line">[OK] WAKATIME HEARTBEAT DETECTED</text>
          <text x="0" y="117" class="log-line" fill="#38bdf8">[SYS] CPU TEMPERATURE: 38.2 C</text>
          <text x="0" y="132" class="log-line" fill="#f472b6">[SYS] LOFI AUDIO STREAM ACTIVE</text>
          <text x="0" y="147" class="log-line" fill="#eab308">[WARN] CORRELATION COEFFICIENT &gt; 99%</text>
          <text x="0" y="162" class="log-line">[SYS] ALL ENGINES GO.</text>
          
          <!-- Segment B (Seamless loop jump) -->
          <text x="0" y="197" class="log-line" fill="#00f5d4" filter="url(#glow-cyan)">[SYS] START NEURAL CORE ENGINE...</text>
          <text x="0" y="212" class="log-line">[SYS] INITIALIZE COGNITION: <tspan fill="#22c55e">OK</tspan></text>
          <text x="0" y="227" class="log-line">[RUN] INTEGRATING FLUTTER MODULES</text>
          <text x="0" y="242" class="log-line">[RUN] COMPILING NEXT.JS ROOT ROUTER</text>
          <text x="0" y="257" class="log-line">[RUN] MOUNTING POSTGRESQL DB POOL</text>
        </g>
      </g>
      <text x="0" y="195" class="log-line" fill="#00f5d4">$ <tspan fill="#ffffff">await xavia.compile()</tspan><rect x="160" y="184" width="6" height="12" class="cursor" /></text>
    </g>

    <!-- Bottom Status Stats -->
    <text x="40" y="278" font-family="monospace" font-size="9" fill="#0077b6" font-weight="bold">SYSTEM STATUS: ACTIVE [100%]</text>
    <text x="305" y="278" font-family="monospace" font-size="9" fill="#00f5d4" font-weight="bold" text-anchor="end">IP: 192.168.88.254</text>
  </g>

  <!-- === CENTER PANEL (3D ROTATING GLOBE REACTOR) === -->
  <g id="center-panel">
    <rect x="370" y="30" width="260" height="260" rx="10" fill="url(#card-grad)" stroke="#0077b6" stroke-width="1.5" stroke-opacity="0.6" filter="url(#glow-blue)" />
    <path d="M370,42 Q370,30 382,30 L618,30 Q630,30 630,42 L630,55 L370,55 Z" fill="#02081a" />
    <text x="500" y="47" class="tech-header" text-anchor="middle">REACTOR_CORE.sys</text>

    <!-- 3D Holographic Spinning Globe Elements -->
    <g class="hologram-globe">
      <!-- Outer Latitude Shells -->
      <ellipse cx="500" cy="180" rx="65" ry="20" fill="none" stroke="#00f5d4" stroke-width="1.5" stroke-opacity="0.8" filter="url(#glow-cyan)" />
      <ellipse cx="500" cy="180" rx="65" ry="20" fill="none" stroke="#0077b6" stroke-width="1" stroke-opacity="0.5" transform="rotate(30, 500, 180)" />
      <ellipse cx="500" cy="180" rx="65" ry="20" fill="none" stroke="#0077b6" stroke-width="1" stroke-opacity="0.5" transform="rotate(-30, 500, 180)" />
      
      <!-- Longitude Shells -->
      <ellipse cx="500" cy="180" rx="20" ry="65" fill="none" stroke="#00b4d8" stroke-width="1.5" stroke-opacity="0.7" filter="url(#glow-blue)" />
      <ellipse cx="500" cy="180" rx="20" ry="65" fill="none" stroke="#0077b6" stroke-width="1" stroke-opacity="0.4" transform="rotate(30, 500, 180)" />
      <ellipse cx="500" cy="180" rx="20" ry="65" fill="none" stroke="#0077b6" stroke-width="1" stroke-opacity="0.4" transform="rotate(-30, 500, 180)" />
      
      <!-- Diagonal Orbit Ring -->
      <ellipse cx="500" cy="180" rx="65" ry="65" fill="none" stroke="#00f5d4" stroke-width="1" stroke-opacity="0.6" transform="rotate(45, 500, 180)" />
    </g>

    <!-- Outer Rotating Telemetry Dash Rings -->
    <circle cx="500" cy="180" r="75" fill="none" stroke="#0077b6" stroke-dasharray="15 8" stroke-width="2.5" class="rotate-cw" filter="url(#glow-blue)" />
    <circle cx="500" cy="180" r="85" fill="none" stroke="#00f5d4" stroke-dasharray="6 14" stroke-width="2" class="rotate-ccw" filter="url(#glow-cyan)" />

    <!-- Crosshair Target Indicators -->
    <g stroke="#0077b6" stroke-opacity="0.3" stroke-width="1.5">
      <line x1="500" y1="90" x2="500" y2="105" />
      <line x1="500" y1="255" x2="500" y2="270" />
      <line x1="410" y1="180" x2="425" y2="180" />
      <line x1="575" y1="180" x2="590" y2="180" />
    </g>

    <!-- Central Pulsing Plasma Reactor Core -->
    <circle cx="500" cy="180" r="14" fill="#02081a" stroke="#00f5d4" stroke-width="2.5" />
    <circle cx="500" cy="180" r="8" fill="#ffffff" class="blink" filter="url(#glow-cyan)" />

    <!-- Reactor Readouts -->
    <text x="500" y="275" font-family="monospace" font-size="10" font-weight="bold" fill="#00f5d4" text-anchor="middle" class="glitch" filter="url(#glow-cyan)">OUTPUT: 5.84 GW [STABLE]</text>
  </g>

  <!-- === RIGHT PANEL (TACTICAL SONAR RADAR & GRAPHS) === -->
  <g id="right-panel">
    <!-- Semi-transparent glass border and card -->
    <rect x="655" y="30" width="320" height="260" rx="10" fill="url(#card-grad)" stroke="#0077b6" stroke-width="1.5" stroke-opacity="0.6" filter="url(#glow-blue)" />
    
    <!-- Window Header -->
    <path d="M655,42 Q655,30 667,30 L963,30 Q975,30 975,42 L975,55 L655,55 Z" fill="#02081a" />
    <text x="815" y="47" class="tech-header" text-anchor="middle">TACTICAL_MONITOR.cfg</text>
    
    <line x1="655" y1="58" x2="975" y2="58" stroke="#0077b6" stroke-width="1" stroke-opacity="0.5" />

    <!-- Tactical Target Bracket Overlay -->
    <path d="M662,70 L662,64 L668,64" fill="none" stroke="#00f5d4" stroke-width="1.5" stroke-opacity="0.8" filter="url(#glow-cyan)" />
    <path d="M968,70 L968,64 L962,64" fill="none" stroke="#00f5d4" stroke-width="1.5" stroke-opacity="0.8" filter="url(#glow-cyan)" />
    <path d="M662,250 L662,256 L668,256" fill="none" stroke="#00f5d4" stroke-width="1.5" stroke-opacity="0.8" filter="url(#glow-cyan)" />
    <path d="M968,250 L968,256 L962,256" fill="none" stroke="#00f5d4" stroke-width="1.5" stroke-opacity="0.8" filter="url(#glow-cyan)" />

    <!-- Sonar Screen (Left Side of Card) -->
    <g transform="translate(10, 0)">
      <!-- Grid Circles -->
      <circle cx="720" cy="160" r="50" fill="#010410" stroke="#0077b6" stroke-width="1" stroke-opacity="0.4" />
      <circle cx="720" cy="160" r="35" fill="none" stroke="#0077b6" stroke-width="1" stroke-opacity="0.3" stroke-dasharray="3 3" />
      <circle cx="720" cy="160" r="20" fill="none" stroke="#0077b6" stroke-width="1" stroke-opacity="0.3" />
      
      <!-- Crosshairs -->
      <line x1="665" y1="160" x2="775" y2="160" stroke="#0077b6" stroke-width="1" stroke-opacity="0.3" />
      <line x1="720" y1="105" x2="720" y2="215" stroke="#0077b6" stroke-width="1" stroke-opacity="0.3" />
      
      <!-- Sonar Sweep Animation line -->
      <line x1="720" y1="160" x2="720" y2="110" stroke="#00f5d4" stroke-width="2" stroke-opacity="0.8" class="radar-sweep-line" filter="url(#glow-cyan)" />
      
      <!-- Target lock-on indicator blip -->
      <circle cx="700" cy="140" r="4" fill="#ff2a6d" class="blink" filter="url(#glow-cyan)" />
      <!-- Pulsing radar ring -->
      <circle cx="700" cy="140" r="10" fill="none" stroke="#ff2a6d" stroke-width="1" class="radar-ping" />
      
      <!-- Sonar Labels -->
      <text x="720" y="225" font-family="monospace" font-size="9" fill="#00b4d8" text-anchor="middle" font-weight="bold">TARGET SECURED</text>
    </g>

    <!-- Diagnostic Resource Load Graphs (Right Side of Card) -->
    <g transform="translate(805, 75)">
      <!-- Graph Framework -->
      <rect x="0" y="0" width="145" height="50" fill="#010410" stroke="#0077b6" stroke-width="1" stroke-opacity="0.3" />
      <line x1="0" y1="25" x2="145" y2="25" stroke="#0077b6" stroke-width="1" stroke-opacity="0.15" stroke-dasharray="2 2" />
      
      <!-- Waveform chart path -->
      <path d="M 0,40 Q 15,10 30,35 T 60,15 T 90,45 T 120,5 T 145,28" fill="none" stroke="#00f5d4" stroke-width="2" filter="url(#glow-cyan)" />
      <path d="M 0,25 Q 20,45 40,20 T 80,10 T 120,40 T 145,15" fill="none" stroke="#4f46e5" stroke-width="1.5" stroke-opacity="0.7" />

      <text x="5" y="10" font-family="monospace" font-size="8" fill="#8fa0c5" font-weight="bold">CPU FREQ: 5.8 GHz</text>
    </g>

    <!-- Real-time Activity Equalizer/Diagnostic bars -->
    <g transform="translate(805, 140)">
      <text x="0" y="0" font-family="monospace" font-size="9" fill="#0077b6" font-weight="bold">COGNITIVE LOAD</text>
      
      <!-- Equalizer Bars -->
      <g stroke="none" fill="#00f5d4" filter="url(#glow-cyan)" fill-opacity="0.8">
        <rect x="0" y="160" width="14" height="40" class="diag-bar-1" rx="2" />
        <rect x="20" y="170" width="14" height="30" class="diag-bar-2" rx="2" fill="#00b4d8" />
        <rect x="40" y="150" width="14" height="50" class="diag-bar-3" rx="2" />
        <rect x="60" y="165" width="14" height="35" class="diag-bar-4" rx="2" fill="#00b4d8" />
      </g>

      <!-- Stat Values -->
      <g transform="translate(85, 15)">
        <text x="0" y="5" font-family="monospace" font-size="9" fill="#8fa0c5">MEM_LOAD: <tspan fill="#00f5d4">94.2%</tspan></text>
        <text x="0" y="20" font-family="monospace" font-size="9" fill="#8fa0c5">SYS_TEMP: <tspan fill="#00f5d4">38.6°C</tspan></text>
        <text x="0" y="35" font-family="monospace" font-size="9" fill="#8fa0c5">LATENCY: <tspan fill="#ff2a6d" font-weight="bold">12ms</tspan></text>
        <text x="0" y="50" font-family="monospace" font-size="9" fill="#22c55e">STABILITY: MAX</text>
      </g>
    </g>

    <!-- Diagnostics telemetry footer -->
    <text x="670" y="278" font-family="monospace" font-size="9" fill="#0077b6" font-weight="bold">MATRIX_NODE_LINK: ONLINE</text>
    <text x="960" y="278" font-family="monospace" font-size="9" fill="#ff2a6d" font-weight="bold" text-anchor="end">FUSION: ACTIVE</text>
  </g>
</svg>
