<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 320" width="100%" height="100%">
  <defs>
    <!-- Cyan and Blue Glow Filters -->
    <filter id="glow-cyan" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur1" />
      <feGaussianBlur stdDeviation="8" result="blur2" />
      <feMerge>
        <feMergeNode in="blur2" />
        <feMergeNode in="blur1" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="glow-blue" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="5" result="blur1" />
      <feGaussianBlur stdDeviation="10" result="blur2" />
      <feMerge>
        <feMergeNode in="blur2" />
        <feMergeNode in="blur1" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Linear Gradients for Cards -->
    <linearGradient id="card-gradient-left" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050814" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#010206" stop-opacity="0.98"/>
    </linearGradient>
    <linearGradient id="card-gradient-right" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#060919" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#010206" stop-opacity="0.98"/>
    </linearGradient>

    <!-- Clip Path for the scrolling 3D grid floor -->
    <clipPath id="grid-clip">
      <polygon points="0,200 1000,200 1000,320 0,320" />
    </clipPath>
    
    <!-- Clip Path for Scrolling Logs -->
    <clipPath id="logs-clip">
      <rect x="0" y="0" width="530" height="180" />
    </clipPath>
  </defs>

  <style>
    /* CSS Animations */
    @keyframes blink {
      0%, 100% { opacity: 0.2; }
      50% { opacity: 1; filter: drop-shadow(0 0 8px #00f5d4); }
    }
    @keyframes cursor-blink {
      0%, 100% { opacity: 0; }
      50% { opacity: 1; }
    }
    @keyframes float-particle {
      0%, 100% { transform: translateY(0px) translateX(0px); opacity: 0.1; }
      50% { transform: translateY(-20px) translateX(8px); opacity: 0.6; }
    }
    @keyframes rotate-cw {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    @keyframes rotate-ccw {
      0% { transform: rotate(360deg); }
      100% { transform: rotate(0deg); }
    }
    @keyframes laser-sweep {
      0% { transform: translateY(0px); opacity: 0; }
      10% { opacity: 0.6; }
      90% { opacity: 0.6; }
      100% { transform: translateY(200px); opacity: 0; }
    }
    
    /* Live Compile Logs Scroll Animation */
    @keyframes log-scroll {
      0% { transform: translateY(0px); }
      100% { transform: translateY(-150px); }
    }

    /* Animation Classes */
    .blink { animation: blink 1.5s infinite ease-in-out; }
    .cursor { animation: cursor-blink 1s infinite; fill: #00f5d4; }
    .rotate-cw { transform-origin: 815px 170px; animation: rotate-cw 20s linear infinite; }
    .rotate-ccw { transform-origin: 815px 170px; animation: rotate-ccw 12s linear infinite; }
    .laser-sweep { animation: laser-sweep 4s infinite linear; stroke: #00f5d4; filter: url(#glow-cyan); }
    .log-scroller { animation: log-scroll 8s linear infinite; }
    
    /* Particles */
    .particle {
      fill: #00f5d4;
      filter: url(#glow-cyan);
      animation: float-particle 6s infinite ease-in-out;
    }
    .p-1 { animation-delay: 0s; }
    .p-2 { animation-delay: 2s; }
    .p-3 { animation-delay: 4s; }

    /* Typography */
    .log-line {
      font-family: 'Courier New', Courier, monospace;
      font-size: 12px;
      font-weight: bold;
      fill: #a5b4fc;
    }
    .status-tag {
      font-family: 'Courier New', monospace;
      font-size: 10px;
      font-weight: bold;
      fill: #64748b;
    }
  </style>

  <!-- Deep Space Dark Background Base -->
  <rect width="1000" height="320" rx="16" fill="#010204" stroke="#0f172a" stroke-width="2" />

  <!-- === 3D INFINITE SCROLLING GRID FLOOR === -->
  <g clip-path="url(#grid-clip)">
    <!-- Flat Grid Base Overlay -->
    <rect y="200" width="1000" height="120" fill="#02040a" />
    
    <!-- Perspective Grid lines -->
    <g stroke="#0056b3" stroke-opacity="0.3" stroke-width="1.5">
      <line x1="-300" y1="320" x2="500" y2="200" />
      <line x1="-100" y1="320" x2="500" y2="200" />
      <line x1="100" y1="320" x2="500" y2="200" />
      <line x1="300" y1="320" x2="500" y2="200" />
      <line x1="500" y1="320" x2="500" y2="200" />
      <line x1="700" y1="320" x2="500" y2="200" />
      <line x1="900" y1="320" x2="500" y2="200" />
      <line x1="1100" y1="320" x2="500" y2="200" />
      <line x1="1300" y1="320" x2="500" y2="200" />
      
      <!-- Horizontal perspective dividers -->
      <path d="M-400,205 L1400,205 M-400,215 L1400,215 M-400,230 L1400,230 M-400,250 L1400,250 M-400,275 L1400,275 M-400,310 L1400,310" stroke-width="1" />
    </g>
    <!-- Cyan neon horizon glow -->
    <line x1="0" y1="200" x2="1000" y2="200" stroke="#00f5d4" stroke-width="2" stroke-opacity="0.8" filter="url(#glow-cyan)" />
  </g>

  <!-- Glowing stars/particles in deep background -->
  <circle cx="120" cy="70" r="1.5" class="particle p-1" />
  <circle cx="480" cy="180" r="1" class="particle p-2" />
  <circle cx="880" cy="70" r="2" class="particle p-3" />

  <!-- === LEFT TERMINAL CARD (IDE / HACKER LOGS) === -->
  <g id="left-panel">
    <!-- Card Glass Base -->
    <rect x="30" y="30" width="600" height="260" rx="12" fill="url(#card-gradient-left)" stroke="#0077b6" stroke-width="1.5" stroke-opacity="0.6" filter="url(#glow-blue)" />
    
    <!-- Top Header Bar -->
    <path d="M30,42 Q30,30 42,30 L618,30 Q630,30 630,42 L630,60 L30,60 Z" fill="#030712" />
    <!-- OS Control Dots -->
    <circle cx="50" cy="45" r="5" fill="#ef4444" />
    <circle cx="68" cy="45" r="5" fill="#f59e0b" />
    <circle cx="86" cy="45" r="5" fill="#10b981" />
    <!-- Title -->
    <text x="330" y="49" font-family="monospace" font-size="11" fill="#475569" text-anchor="middle" letter-spacing="2">XAVIA_TACTICAL_TERMINAL.sh</text>
    <!-- Active status indicator -->
    <circle cx="595" cy="45" r="4" fill="#00f5d4" class="blink" />
    <text x="582" y="48" font-family="monospace" font-size="9" fill="#00f5d4" text-anchor="end">SYS_ACTIVE</text>

    <!-- Tactical Target Bracket Overlay -->
    <!-- Top Left -->
    <path d="M40,75 L40,65 L50,65" fill="none" stroke="#00f5d4" stroke-width="2" stroke-opacity="0.8" filter="url(#glow-cyan)" />
    <!-- Top Right -->
    <path d="M620,75 L620,65 L610,65" fill="none" stroke="#00f5d4" stroke-width="2" stroke-opacity="0.8" filter="url(#glow-cyan)" />
    <!-- Bottom Left -->
    <path d="M40,245 L40,255 L50,255" fill="none" stroke="#00f5d4" stroke-width="2" stroke-opacity="0.8" filter="url(#glow-cyan)" />
    <!-- Bottom Right -->
    <path d="M620,245 L620,255 L610,255" fill="none" stroke="#00f5d4" stroke-width="2" stroke-opacity="0.8" filter="url(#glow-cyan)" />

    <!-- Scanning Laser Sweep Line -->
    <line x1="32" y1="62" x2="628" y2="62" stroke-width="1.5" class="laser-sweep" />

    <!-- Terminal Output Log Waterfall (Scrolling Infinitely) -->
    <g transform="translate(60, 75)">
      <!-- Line Numbers -->
      <g font-family="monospace" font-size="11" fill="#1e293b" text-anchor="end">
        <text x="-15" y="15">01</text>
        <text x="-15" y="40">02</text>
        <text x="-15" y="65">03</text>
        <text x="-15" y="90">04</text>
        <text x="-15" y="115">05</text>
        <text x="-15" y="140">06</text>
        <text x="-15" y="165">07</text>
      </g>
      
      <!-- Clip masked infinite scroller -->
      <g clip-path="url(#logs-clip)">
        <g class="log-scroller">
          <!-- BLOCK 1 (Height: 150px) -->
          <text x="10" y="15" class="log-line" fill="#00f5d4" filter="url(#glow-cyan)">[ OK ] INITIALIZING TACTICAL NEURAL CONFIG...</text>
          <text x="10" y="40" class="log-line">[ OK ] ENGINE: <tspan fill="#38bdf8">ACTIVE_V5</tspan> | LATENCY: <tspan fill="#34d399">0.2ms</tspan></text>
          <text x="10" y="65" class="log-line">[ INFO ] COMPILING FLUTTER &amp; NEXTJS MODULES...</text>
          <text x="10" y="90" class="log-line">[ OK ] CONNECTION TUNNEL ESTABLISHED [SECURE]</text>
          <text x="10" y="115" class="log-line" fill="#38bdf8">[ OK ] AI MODEL: GEMINI-3.5-FLASH ON STANDBY</text>
          <text x="10" y="140" class="log-line" fill="#f472b6">[ PLAYING ] SYNTHWAVE PROTOCOL ACTIVE</text>
          
          <!-- BLOCK 2 (Exact repeating block for seamless loop) -->
          <text x="10" y="165" class="log-line" fill="#00f5d4" filter="url(#glow-cyan)">[ OK ] INITIALIZING TACTICAL NEURAL CONFIG...</text>
          <text x="10" y="190" class="log-line">[ OK ] ENGINE: <tspan fill="#38bdf8">ACTIVE_V5</tspan> | LATENCY: <tspan fill="#34d399">0.2ms</tspan></text>
          <text x="10" y="215" class="log-line">[ INFO ] COMPILING FLUTTER &amp; NEXTJS MODULES...</text>
          <text x="10" y="240" class="log-line">[ OK ] CONNECTION TUNNEL ESTABLISHED [SECURE]</text>
          <text x="10" y="265" class="log-line" fill="#38bdf8">[ OK ] AI MODEL: GEMINI-3.5-FLASH ON STANDBY</text>
          <text x="10" y="290" class="log-line" fill="#f472b6">[ PLAYING ] SYNTHWAVE PROTOCOL ACTIVE</text>
        </g>
      </g>
      
      <!-- Bottom static command line -->
      <g transform="translate(0, 185)">
        <text x="10" y="12" class="log-line" fill="#00f5d4">$ <tspan fill="#ffffff">ready_for_collaboration --project=all</tspan><rect x="345" y="-1" width="8" height="15" class="cursor" /></text>
      </g>
    </g>
  </g>

  <!-- === RIGHT CARD (CYBER FUSION REACTOR) === -->
  <g id="right-panel">
    <!-- Card Glass Base -->
    <rect x="660" y="30" width="310" height="260" rx="12" fill="url(#card-gradient-right)" stroke="#0077b6" stroke-width="1.5" stroke-opacity="0.6" filter="url(#glow-blue)" />
    
    <!-- Top Header Bar -->
    <path d="M660,42 Q660,30 672,30 L958,30 Q970,30 970,42 L970,60 L660,60 Z" fill="#030712" />
    <text x="815" y="49" font-family="monospace" font-size="11" fill="#475569" text-anchor="middle" letter-spacing="2">FUSION_REACTOR.cfg</text>

    <!-- Tactical Target Bracket Overlay -->
    <!-- Top Left -->
    <path d="M670,75 L670,65 L680,65" fill="none" stroke="#00f5d4" stroke-width="2" stroke-opacity="0.8" filter="url(#glow-cyan)" />
    <!-- Top Right -->
    <path d="M960,75 L960,65 L950,65" fill="none" stroke="#00f5d4" stroke-width="2" stroke-opacity="0.8" filter="url(#glow-cyan)" />
    <!-- Bottom Left -->
    <path d="M670,245 L670,255 L680,255" fill="none" stroke="#00f5d4" stroke-width="2" stroke-opacity="0.8" filter="url(#glow-cyan)" />
    <!-- Bottom Right -->
    <path d="M960,245 L960,255 L950,255" fill="none" stroke="#00f5d4" stroke-width="2" stroke-opacity="0.8" filter="url(#glow-cyan)" />

    <!-- === COCENTRAC FUSION REACTOR CORES === -->
    <!-- Outer Reactor: Spinning Telemetry Dashes -->
    <circle cx="815" cy="170" r="65" fill="none" stroke="#0077b6" stroke-dasharray="15 6" stroke-width="2.5" class="rotate-cw" filter="url(#glow-blue)"/>
    <!-- Outer Ring Crosshair ticks -->
    <g stroke="#0077b6" stroke-opacity="0.5" stroke-width="1.5">
      <line x1="815" y1="95" x2="815" y2="105" />
      <line x1="815" y1="235" x2="815" y2="245" />
      <line x1="740" y1="170" x2="750" y2="170" />
      <line x1="880" y1="170" x2="890" y2="170" />
    </g>

    <!-- Middle Reactor: Counter-spinning Ticks and warning sectors -->
    <circle cx="815" cy="170" r="50" fill="none" stroke="#00f5d4" stroke-dasharray="6 12 18 12" stroke-width="3" class="rotate-ccw" filter="url(#glow-cyan)"/>

    <!-- Inner Reactor: Glowing core containment and plasma -->
    <circle cx="815" cy="170" r="28" fill="#020512" stroke="#00f5d4" stroke-width="2" />
    <!-- Central Pulsing Plasma Node -->
    <g class="blink">
      <circle cx="815" cy="170" r="14" fill="#00f5d4" filter="url(#glow-cyan)"/>
      <circle cx="815" cy="170" r="6" fill="#ffffff" />
    </g>
    
    <!-- Outer telemetry arcs (faint HUD) -->
    <path d="M 735,170 A 80,80 0 0,1 895,170" fill="none" stroke="#0077b6" stroke-width="1" stroke-opacity="0.3" stroke-dasharray="3 3"/>
    <path d="M 735,170 A 80,80 0 0,0 895,170" fill="none" stroke="#0077b6" stroke-width="1" stroke-opacity="0.3" stroke-dasharray="3 3"/>

    <!-- Reactor Stats Data Overlay (Super badass telemetry) -->
    <g transform="translate(680, 80)">
      <text x="0" y="8" class="status-tag">CORE_TEMP</text>
      <text x="0" y="21" font-family="monospace" font-size="11" font-weight="bold" fill="#00f5d4">1.2e8 K</text>
    </g>
    <g transform="translate(680, 140)">
      <text x="0" y="8" class="status-tag">REACTOR_STATUS</text>
      <text x="0" y="21" font-family="monospace" font-size="11" font-weight="bold" fill="#10b981">STABLE</text>
    </g>
    <g transform="translate(680, 200)">
      <text x="0" y="8" class="status-tag">MAG_FIELD</text>
      <text x="0" y="21" font-family="monospace" font-size="11" font-weight="bold" fill="#38bdf8">4.82 T</text>
    </g>

    <g transform="translate(950, 80)" text-anchor="end">
      <text x="0" y="8" class="status-tag">PWR_OUTPUT</text>
      <text x="0" y="21" font-family="monospace" font-size="11" font-weight="bold" fill="#00f5d4">1.42 GW</text>
    </g>
    <g transform="translate(950, 140)" text-anchor="end">
      <text x="0" y="8" class="status-tag">COGNITIVE_RATE</text>
      <text x="0" y="21" font-family="monospace" font-size="11" font-weight="bold" fill="#00f5d4">MAX_CAP</text>
    </g>
    <g transform="translate(950, 200)" text-anchor="end">
      <text x="0" y="8" class="status-tag">FUEL_RATIO</text>
      <text x="0" y="21" font-family="monospace" font-size="11" font-weight="bold" fill="#38bdf8">98.44%</text>
    </g>
  </g>
</svg>
