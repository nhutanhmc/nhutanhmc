<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 320" width="100%" height="100%">
  <defs>
    <!-- Cyan and Blue Glow Filters -->
    <filter id="glow-cyan" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur1" />
      <feGaussianBlur stdDeviation="8" result="blur2" />
      <feMerge>
        <feMergeNode in="blur2" />
        <feMergeNode in="blur1" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="glow-blue" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="5" result="blur1" />
      <feGaussianBlur stdDeviation="10" result="blur2" />
      <feMerge>
        <feMergeNode in="blur2" />
        <feMergeNode in="blur1" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Linear Gradients for Cards -->
    <linearGradient id="card-gradient-left" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#070d1e" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#020617" stop-opacity="0.95"/>
    </linearGradient>
    <linearGradient id="card-gradient-right" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#09122c" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#020617" stop-opacity="0.95"/>
    </linearGradient>

    <!-- Clip Path for the scrolling 3D grid floor -->
    <clipPath id="grid-clip">
      <polygon points="0,200 1000,200 1000,320 0,320" />
    </clipPath>
  </defs>

  <style>
    /* CSS Animations */
    @keyframes blink {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 1; filter: drop-shadow(0 0 8px #00f5d4); }
    }
    @keyframes cursor-blink {
      0%, 100% { opacity: 0; }
      50% { opacity: 1; }
    }
    @keyframes float-particle {
      0%, 100% { transform: translateY(0px) translateX(0px); opacity: 0.2; }
      50% { transform: translateY(-15px) translateX(5px); opacity: 0.7; }
    }
    
    /* 3D Spinning Hologram Globe Animation */
    @keyframes spin3d {
      0% { transform: rotateX(20deg) rotateY(0deg) rotateZ(0deg); }
      100% { transform: rotateX(20deg) rotateY(360deg) rotateZ(360deg); }
    }

    /* Scene Setup for 3D perspective */
    .hologram-container {
      transform-style: preserve-3d;
      perspective: 500px;
    }
    
    .hologram-globe {
      transform-style: preserve-3d;
      transform-origin: 815px 170px;
      animation: spin3d 18s linear infinite;
    }

    /* General Animations & Styles */
    .blink { animation: blink 2s infinite ease-in-out; }
    .cursor { animation: cursor-blink 1s infinite; fill: #00f5d4; }
    
    /* Particles */
    .particle {
      fill: #00f5d4;
      filter: url(#glow-cyan);
      animation: float-particle 5s infinite ease-in-out;
    }
    .p-1 { animation-delay: 0s; }
    .p-2 { animation-delay: 1.5s; animation-duration: 6s; }
    .p-3 { animation-delay: 3s; animation-duration: 4s; }
    .p-4 { animation-delay: 0.5s; animation-duration: 7s; }
    
    .log-line {
      font-family: 'Courier New', Courier, monospace;
      font-size: 13px;
      font-weight: bold;
      fill: #e2e8f0;
    }
  </style>

  <!-- Background Base -->
  <rect width="1000" height="320" rx="16" fill="#02040a" stroke="#111827" stroke-width="1.5" />

  <!-- === 3D INFINITE SCROLLING GRID FLOOR === -->
  <g clip-path="url(#grid-clip)">
    <!-- Flat Grid Darkening Overlay -->
    <rect y="200" width="1000" height="120" fill="#030712" />
    
    <!-- Perspective Grid projection -->
    <g stroke="#0077b6" stroke-opacity="0.25" stroke-width="1.5">
      <line x1="-300" y1="320" x2="500" y2="200" />
      <line x1="-100" y1="320" x2="500" y2="200" />
      <line x1="100" y1="320" x2="500" y2="200" />
      <line x1="300" y1="320" x2="500" y2="200" />
      <line x1="500" y1="320" x2="500" y2="200" />
      <line x1="700" y1="320" x2="500" y2="200" />
      <line x1="900" y1="320" x2="500" y2="200" />
      <line x1="1100" y1="320" x2="500" y2="200" />
      <line x1="1300" y1="320" x2="500" y2="200" />
      
      <!-- Scrolling horizontal perspective divisions -->
      <path d="M-400,205 L1400,205 M-400,215 L1400,215 M-400,230 L1400,230 M-400,250 L1400,250 M-400,275 L1400,275 M-400,310 L1400,310" stroke-width="1" />
    </g>
    <!-- Cyan neon horizon glow -->
    <line x1="0" y1="200" x2="1000" y2="200" stroke="#00f5d4" stroke-width="2" stroke-opacity="0.6" filter="url(#glow-cyan)" />
  </g>

  <!-- Faint HUD ring lines in background -->
  <circle cx="500" cy="-100" r="450" fill="none" stroke="#0077b6" stroke-opacity="0.08" stroke-width="2"/>
  <circle cx="500" cy="-100" r="550" fill="none" stroke="#0077b6" stroke-opacity="0.04" stroke-width="1.5" stroke-dasharray="15 5"/>

  <!-- Glowing HUD stars/particles -->
  <circle cx="150" cy="80" r="2" class="particle p-1" />
  <circle cx="350" cy="180" r="1.5" class="particle p-2" />
  <circle cx="680" cy="90" r="2.5" class="particle p-3" />
  <circle cx="890" cy="220" r="1.5" class="particle p-4" />

  <!-- === LEFT TERMINAL CARD === -->
  <g id="left-panel">
    <!-- Card outline glow -->
    <rect x="30" y="30" width="600" height="260" rx="12" fill="url(#card-gradient-left)" stroke="#0077b6" stroke-width="1.5" stroke-opacity="0.6" filter="url(#glow-blue)" />
    <rect x="30" y="30" width="600" height="260" rx="12" fill="none" stroke="#00f5d4" stroke-width="1" stroke-opacity="0.3" />
    
    <!-- Top header layout -->
    <path d="M30,42 Q30,30 42,30 L618,30 Q630,30 630,42 L630,60 L30,60 Z" fill="#060b18" opacity="0.8" />
    <circle cx="50" cy="45" r="5" fill="#f87171" />
    <circle cx="68" cy="45" r="5" fill="#fbbf24" />
    <circle cx="86" cy="45" r="5" fill="#34d399" />
    <text x="330" y="50" font-family="monospace" font-size="11" fill="#475569" text-anchor="middle" letter-spacing="1">XAVIA_CORE_TERMINAL.sh</text>
    
    <circle cx="595" cy="45" r="4" fill="#00f5d4" class="blink" />
    <text x="582" y="48" font-family="monospace" font-size="9" fill="#00f5d4" text-anchor="end">SYS_ACTIVE</text>

    <!-- Terminal Inner Text -->
    <g transform="translate(55, 90)">
      <!-- Line numbers -->
      <g font-family="monospace" font-size="12" fill="#1e293b" text-anchor="end">
        <text x="-10" y="15">01</text>
        <text x="-10" y="40">02</text>
        <text x="-10" y="65">03</text>
        <text x="-10" y="90">04</text>
        <text x="-10" y="115">05</text>
        <text x="-10" y="140">06</text>
        <text x="-10" y="165">07</text>
      </g>
      
      <!-- Code logs -->
      <text x="10" y="15" class="log-line" font-weight="bold" fill="#00f5d4" filter="url(#glow-cyan)">> INITIALIZING XAVIA INTERFACE PROTOCOL...</text>
      <text x="10" y="40" class="log-line">> STATUS: <tspan fill="#34d399">ONLINE</tspan> | CORE: <tspan fill="#00f5d4">NEURAL_ENGINE_V5</tspan></text>
      <text x="10" y="65" class="log-line">> DIRECTIVE: <tspan fill="#60a5fa">BUILDING NEXT-GEN APPLICATIONS</tspan></text>
      <text x="10" y="90" class="log-line">> FOCUS: <tspan fill="#c084fc">[FULLSTACK, MOBILE_DEV, AI_INTEGRATION]</tspan></text>
      <text x="10" y="115" class="log-line">> ENVIRONMENT: <tspan fill="#f43f5e">NODE_19 / NEXT_16 / DART_FLUTTER</tspan></text>
      <text x="10" y="140" class="log-line">> LOFI SOUNDTRACK: <tspan fill="#f472b6">PLAYING [02:45 / 04:12]</tspan></text>
      <text x="10" y="165" class="log-line" fill="#00f5d4">$ <tspan fill="#ffffff">ready_for_collaboration --input=your_idea</tspan><rect x="365" y="152" width="8" height="15" class="cursor" /></text>
    </g>
  </g>

  <!-- === RIGHT CARD (System HUD Indicators with 3D Hologram Globe) === -->
  <g id="right-panel">
    <!-- Card outline glow -->
    <rect x="660" y="30" width="310" height="260" rx="12" fill="url(#card-gradient-right)" stroke="#0077b6" stroke-width="1.5" stroke-opacity="0.6" filter="url(#glow-blue)" />
    <rect x="660" y="30" width="310" height="260" rx="12" fill="none" stroke="#00f5d4" stroke-width="1" stroke-opacity="0.3" />
    
    <!-- Top header layout -->
    <path d="M660,42 Q660,30 672,30 L958,30 Q970,30 970,42 L970,60 L660,60 Z" fill="#060b18" opacity="0.8" />
    <text x="815" y="49" font-family="monospace" font-size="11" fill="#475569" text-anchor="middle" letter-spacing="1">SYSTEMS_COCKPIT.cfg</text>

    <!-- === SPINNING 3D HOLOGRAM GLOBE === -->
    <g class="hologram-container">
      <g class="hologram-globe">
        <!-- Latitudinal / Horizontal Ring -->
        <ellipse cx="815" cy="170" rx="48" ry="14" fill="none" stroke="#00f5d4" stroke-width="1.5" stroke-opacity="0.8" filter="url(#glow-cyan)" />
        <ellipse cx="815" cy="170" rx="48" ry="14" fill="none" stroke="#0077b6" stroke-width="1" stroke-opacity="0.5" transform="rotate(30, 815, 170)" />
        <ellipse cx="815" cy="170" rx="48" ry="14" fill="none" stroke="#0077b6" stroke-width="1" stroke-opacity="0.5" transform="rotate(-30, 815, 170)" />

        <!-- Longitudinal / Vertical Ring -->
        <ellipse cx="815" cy="170" rx="14" ry="48" fill="none" stroke="#0077b6" stroke-width="1.5" stroke-opacity="0.8" filter="url(#glow-blue)" />
        <ellipse cx="815" cy="170" rx="14" ry="48" fill="none" stroke="#0077b6" stroke-width="1" stroke-opacity="0.5" transform="rotate(30, 815, 170)" />
        <ellipse cx="815" cy="170" rx="14" ry="48" fill="none" stroke="#0077b6" stroke-width="1" stroke-opacity="0.5" transform="rotate(-30, 815, 170)" />

        <!-- Diagonal Orbiting Ring -->
        <ellipse cx="815" cy="170" rx="48" ry="48" fill="none" stroke="#00f5d4" stroke-width="1" stroke-opacity="0.6" filter="url(#glow-cyan)" transform="rotate(45, 815, 170)" />
        <ellipse cx="815" cy="170" rx="48" ry="48" fill="none" stroke="#0077b6" stroke-width="1" stroke-opacity="0.6" filter="url(#glow-blue)" transform="rotate(-45, 815, 170)" />

        <!-- Core Sphere -->
        <circle cx="815" cy="170" r="10" fill="#ffffff" filter="url(#glow-cyan)" />
      </g>
    </g>

    <!-- Outer radar rings (dashed HUD context) -->
    <circle cx="815" cy="170" r="62" fill="none" stroke="#0077b6" stroke-dasharray="8 6" stroke-width="1" stroke-opacity="0.4" />
    <circle cx="815" cy="170" r="75" fill="none" stroke="#0077b6" stroke-dasharray="4 8" stroke-width="1" stroke-opacity="0.3" />

    <!-- Metrics indicators -->
    <!-- CREATIVITY -->
    <g transform="translate(680, 80)">
      <text x="0" y="8" font-family="sans-serif" font-size="9" font-weight="bold" fill="#64748b" letter-spacing="1">CREATIVITY</text>
      <text x="0" y="22" font-family="monospace" font-size="12" font-weight="bold" fill="#00f5d4">MAX_LEVEL</text>
      <rect x="0" y="28" width="60" height="3" rx="1.5" fill="#1e293b" />
      <rect x="0" y="28" width="60" height="3" rx="1.5" fill="#00f5d4" filter="url(#glow-cyan)" />
    </g>
    
    <!-- OPTIMIZATION -->
    <g transform="translate(680, 140)">
      <text x="0" y="8" font-family="sans-serif" font-size="9" font-weight="bold" fill="#64748b" letter-spacing="1">OPTIMIZATION</text>
      <text x="0" y="22" font-family="monospace" font-size="12" font-weight="bold" fill="#00f5d4">98.24%</text>
      <rect x="0" y="28" width="60" height="3" rx="1.5" fill="#1e293b" />
      <rect x="0" y="28" width="59" height="3" rx="1.5" fill="#00f5d4" filter="url(#glow-cyan)" />
    </g>

    <!-- COFFEE LEVEL -->
    <g transform="translate(680, 200)">
      <text x="0" y="8" font-family="sans-serif" font-size="9" font-weight="bold" fill="#64748b" letter-spacing="1">COFFEE LEVEL</text>
      <text x="0" y="22" font-family="monospace" font-size="12" font-weight="bold" fill="#38bdf8">75.50%</text>
      <rect x="0" y="28" width="60" height="3" rx="1.5" fill="#1e293b" />
      <rect x="0" y="28" width="45" height="3" rx="1.5" fill="#38bdf8" filter="url(#glow-blue)" />
    </g>

    <!-- INTEGRITY -->
    <g transform="translate(890, 80)">
      <text x="60" y="8" font-family="sans-serif" font-size="9" font-weight="bold" fill="#64748b" letter-spacing="1" text-anchor="end">INTEGRITY</text>
      <text x="60" y="22" font-family="monospace" font-size="12" font-weight="bold" fill="#00f5d4" text-anchor="end">SECURE</text>
      <rect x="0" y="28" width="60" height="3" rx="1.5" fill="#1e293b" />
      <rect x="0" y="28" width="60" height="3" rx="1.5" fill="#00f5d4" filter="url(#glow-cyan)" />
    </g>

    <!-- DEV_SPEED -->
    <g transform="translate(890, 140)">
      <text x="60" y="8" font-family="sans-serif" font-size="9" font-weight="bold" fill="#64748b" letter-spacing="1" text-anchor="end">DEV_SPEED</text>
      <text x="60" y="22" font-family="monospace" font-size="12" font-weight="bold" fill="#00f5d4" text-anchor="end">FAST</text>
      <rect x="0" y="28" width="60" height="3" rx="1.5" fill="#1e293b" />
      <rect x="0" y="28" width="54" height="3" rx="1.5" fill="#00f5d4" filter="url(#glow-cyan)" />
    </g>

    <!-- UPTIME -->
    <g transform="translate(890, 200)">
      <text x="60" y="8" font-family="sans-serif" font-size="9" font-weight="bold" fill="#64748b" letter-spacing="1" text-anchor="end">UPTIME</text>
      <text x="60" y="22" font-family="monospace" font-size="12" font-weight="bold" fill="#38bdf8" text-anchor="end">99.98%</text>
      <rect x="0" y="28" width="60" height="3" rx="1.5" fill="#1e293b" />
      <rect x="0" y="28" width="59" height="3" rx="1.5" fill="#38bdf8" filter="url(#glow-blue)" />
    </g>
  </g>
</svg>
