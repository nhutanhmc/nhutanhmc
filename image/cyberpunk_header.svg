<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 320" width="100%" height="100%">
  <defs>
    <!-- Cyan and Blue Glow Filters -->
    <filter id="glow-cyan" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur1" />
      <feGaussianBlur stdDeviation="8" result="blur2" />
      <feMerge>
        <feMergeNode in="blur2" />
        <feMergeNode in="blur1" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="glow-blue" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur1" />
      <feGaussianBlur stdDeviation="8" result="blur2" />
      <feMerge>
        <feMergeNode in="blur2" />
        <feMergeNode in="blur1" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Linear Gradients for Panels -->
    <linearGradient id="panel-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b132b" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#020617" stop-opacity="0.95"/>
    </linearGradient>
    
    <!-- Radar Sweep Gradient -->
    <linearGradient id="scanline-gradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00f5d4" stop-opacity="0.0"/>
      <stop offset="50%" stop-color="#00f5d4" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#00f5d4" stop-opacity="0.0"/>
    </linearGradient>
  </defs>

  <style>
    /* CSS Animations */
    @keyframes blink {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 1; filter: drop-shadow(0 0 8px #00f5d4); }
    }
    @keyframes scan {
      0% { transform: translateY(-300px); }
      100% { transform: translateY(300px); }
    }
    @keyframes rotate-gauge {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    @keyframes typing {
      0%, 100% { opacity: 0; }
      5% { opacity: 1; }
      95% { opacity: 1; }
    }
    @keyframes cursor-blink {
      0%, 100% { opacity: 0; }
      50% { opacity: 1; }
    }
    @keyframes dash-grow {
      0% { stroke-dashoffset: 200; }
      50% { stroke-dashoffset: 0; }
      100% { stroke-dashoffset: 200; }
    }

    /* Animation utility classes */
    .blink { animation: blink 2s infinite ease-in-out; }
    .scanline { animation: scan 6s linear infinite; }
    .rotate-cw { transform-origin: 820px 170px; animation: rotate-gauge 25s linear infinite; }
    .rotate-ccw { transform-origin: 820px 170px; animation: rotate-gauge 15s linear infinite reverse; }
    .cursor { animation: cursor-blink 1s infinite; fill: #00f5d4; }
    
    /* Typing Logs sequential display */
    .log-line {
      font-family: 'Courier New', Courier, monospace;
      font-size: 13px;
      font-weight: bold;
      fill: #a5b4fc;
    }
    .log-cyan { fill: #00f5d4; filter: url(#glow-cyan); }
    .log-blue { fill: #38bdf8; }
    
    .hud-title {
      font-family: 'Inter', sans-serif;
      font-size: 10px;
      font-weight: bold;
      letter-spacing: 2px;
      fill: #64748b;
    }
    .hud-value {
      font-family: 'Courier New', monospace;
      font-size: 12px;
      font-weight: bold;
      fill: #00f5d4;
    }
    
    /* Tech grid styling */
    .bg-grid {
      stroke: #1e293b;
      stroke-opacity: 0.15;
    }
  </style>

  <!-- Background Base -->
  <rect width="1000" height="320" rx="16" fill="#020617" stroke="#1e293b" stroke-width="1.5" />
  
  <!-- Cyber HUD Background Grid -->
  <g class="bg-grid" stroke-width="1">
    <!-- Horizontal -->
    <line x1="0" y1="40" x2="1000" y2="40" />
    <line x1="0" y1="80" x2="1000" y2="80" />
    <line x1="0" y1="120" x2="1000" y2="120" />
    <line x1="0" y1="160" x2="1000" y2="160" />
    <line x1="0" y1="200" x2="1000" y2="200" />
    <line x1="0" y1="240" x2="1000" y2="240" />
    <line x1="0" y1="280" x2="1000" y2="280" />
    <!-- Vertical -->
    <line x1="100" y1="0" x2="100" y2="320" />
    <line x1="200" y1="0" x2="200" y2="320" />
    <line x1="300" y1="0" x2="300" y2="320" />
    <line x1="400" y1="0" x2="400" y2="320" />
    <line x1="500" y1="0" x2="500" y2="320" />
    <line x1="600" y1="0" x2="600" y2="320" />
    <line x1="700" y1="0" x2="700" y2="320" />
    <line x1="800" y1="0" x2="800" y2="320" />
    <line x1="900" y1="0" x2="900" y2="320" />
  </g>

  <!-- Giant faint background radar lines -->
  <circle cx="820" cy="170" r="140" fill="none" stroke="#1e293b" stroke-opacity="0.2" stroke-width="1"/>
  <circle cx="820" cy="170" r="90" fill="none" stroke="#1e293b" stroke-opacity="0.2" stroke-width="1"/>

  <!-- === LEFT TERMINAL WINDOW PANEL (macOS IDE style) === -->
  <g transform="translate(30, 30)">
    <!-- Terminal Glass Card -->
    <rect width="600" height="260" rx="12" fill="url(#panel-gradient)" stroke="#0077b6" stroke-width="1.5" stroke-opacity="0.7" />
    
    <!-- Header bar -->
    <path d="M0,12 Q0,0 12,0 L588,0 Q600,0 600,12 L600,30 L0,30 Z" fill="#080e22" opacity="0.8" />
    <!-- Dot controls -->
    <circle cx="20" cy="15" r="6" fill="#f87171" />
    <circle cx="40" cy="15" r="6" fill="#fbbf24" />
    <circle cx="60" cy="15" r="6" fill="#34d399" />
    <!-- Terminal Title -->
    <text x="300" y="20" font-family="monospace" font-size="11" fill="#475569" text-anchor="middle" letter-spacing="1">XAVIA_CORE_TERMINAL.sh</text>

    <!-- Blinking green Active Status indicator -->
    <circle cx="565" cy="15" r="5" fill="#00f5d4" class="blink" />
    <text x="550" y="19" font-family="monospace" font-size="9" fill="#00f5d4" text-anchor="end">SYS_ACTIVE</text>

    <!-- Terminal Content (Code/Logs) -->
    <g transform="translate(25, 60)">
      <!-- Line numbers -->
      <g font-family="monospace" font-size="12" fill="#334155" text-anchor="end">
        <text x="-5" y="15">01</text>
        <text x="-5" y="40">02</text>
        <text x="-5" y="65">03</text>
        <text x="-5" y="90">04</text>
        <text x="-5" y="115">05</text>
        <text x="-5" y="140">06</text>
        <text x="-5" y="165">07</text>
      </g>
      
      <!-- Script Logs -->
      <text x="15" y="15" class="log-line log-cyan">> INITIALIZING XAVIA INTERFACE PROTOCOL...</text>
      <text x="15" y="40" class="log-line">> STATUS: <tspan fill="#34d399">ONLINE</tspan> | CORE: <tspan class="log-cyan">NEURAL_ENGINE_V5</tspan></text>
      <text x="15" y="65" class="log-line">> DIRECTIVE: <tspan fill="#60a5fa">BUILDING NEXT-GEN APPLICATIONS</tspan></text>
      <text x="15" y="90" class="log-line">> FOCUS: <tspan fill="#a78bfa">[FULLSTACK, MOBILE_DEV, AI_INTEGRATION]</tspan></text>
      <text x="15" y="115" class="log-line">> ENVIRONMENT: <tspan fill="#fb7185">NODE_19 / NEXT_16 / DART_FLUTTER</tspan></text>
      <text x="15" y="140" class="log-line">> LOFI SOUNDTRACK: <tspan fill="#f472b6">PLAYING [02:45 / 04:12]</tspan></text>
      
      <!-- User prompt with cursor -->
      <text x="15" y="165" class="log-line log-cyan">$ <tspan fill="#ffffff">ready_for_collaboration --input=your_idea</tspan><rect x="365" y="152" width="8" height="15" class="cursor" /></text>
    </g>
  </g>

  <!-- === RIGHT COCKPIT HUD PANEL (Gauges and Reactor) === -->
  <g transform="translate(660, 30)">
    <!-- HUD Card Glass Panel -->
    <rect width="310" height="260" rx="12" fill="url(#panel-gradient)" stroke="#0077b6" stroke-width="1.5" stroke-opacity="0.7" />
    
    <!-- Top bar -->
    <path d="M0,12 Q0,0 12,0 L298,0 Q310,0 310,12 L310,30 L0,30 Z" fill="#080e22" opacity="0.8" />
    <text x="155" y="20" font-family="monospace" font-size="11" fill="#475569" text-anchor="middle" letter-spacing="1">SYSTEMS_COCKPIT.cfg</text>

    <!-- Radar / Circular HUD gauge -->
    <!-- Outer dash-spinning circle -->
    <circle cx="160" cy="140" r="60" fill="none" stroke="#0077b6" stroke-dasharray="10 6" stroke-width="1.5" class="rotate-cw" filter="url(#glow-blue)"/>
    <!-- Inner dash-spinning circle -->
    <circle cx="160" cy="140" r="45" fill="none" stroke="#00f5d4" stroke-dasharray="5 15" stroke-width="2" class="rotate-ccw" filter="url(#glow-cyan)"/>
    <!-- Center glowing core -->
    <circle cx="160" cy="140" r="25" fill="#0a192f" stroke="#00f5d4" stroke-width="1.5" />
    <circle cx="160" cy="140" r="10" fill="#00f5d4" filter="url(#glow-cyan)" />
    <!-- Reactor crosshair lines -->
    <line x1="160" y1="100" x2="160" y2="180" stroke="#0077b6" stroke-opacity="0.4" stroke-width="1"/>
    <line x1="120" y1="140" x2="200" y2="140" stroke="#0077b6" stroke-opacity="0.4" stroke-width="1"/>

    <!-- Left & Right Metrics Indicators -->
    <!-- Left Metric: CREATIVITY -->
    <g transform="translate(15, 60)">
      <text x="0" y="10" class="hud-title">CREATIVITY</text>
      <text x="0" y="26" class="hud-value">MAX_LEVEL</text>
      <rect x="0" y="32" width="65" height="4" rx="2" fill="#1e293b" />
      <rect x="0" y="32" width="65" height="4" rx="2" fill="#00f5d4" filter="url(#glow-cyan)" />
    </g>
    
    <!-- Left Metric 2: OPTIMIZATION -->
    <g transform="translate(15, 125)">
      <text x="0" y="10" class="hud-title">OPTIMIZATION</text>
      <text x="0" y="26" class="hud-value">98.24%</text>
      <rect x="0" y="32" width="65" height="4" rx="2" fill="#1e293b" />
      <rect x="0" y="32" width="64" height="4" rx="2" fill="#00f5d4" filter="url(#glow-cyan)" />
    </g>

    <!-- Left Metric 3: COFFEE LEVEL -->
    <g transform="translate(15, 190)">
      <text x="0" y="10" class="hud-title">COFFEE LEVEL</text>
      <text x="0" y="26" class="hud-value">75.50%</text>
      <rect x="0" y="32" width="65" height="4" rx="2" fill="#1e293b" />
      <rect x="0" y="32" width="49" height="4" rx="2" fill="#38bdf8" filter="url(#glow-blue)" />
    </g>

    <!-- Right Metric: SECURITY -->
    <g transform="translate(230, 60)">
      <text x="65" y="10" class="hud-title" text-anchor="end">INTEGRITY</text>
      <text x="65" y="26" class="hud-value" text-anchor="end">SECURE</text>
      <!-- Draw right aligned bar -->
      <rect x="0" y="32" width="65" height="4" rx="2" fill="#1e293b" />
      <rect x="0" y="32" width="65" height="4" rx="2" fill="#00f5d4" filter="url(#glow-cyan)" />
    </g>

    <!-- Right Metric 2: DEV SPEED -->
    <g transform="translate(230, 125)">
      <text x="65" y="10" class="hud-title" text-anchor="end">DEV_SPEED</text>
      <text x="65" y="26" class="hud-value" text-anchor="end">FAST</text>
      <rect x="0" y="32" width="65" height="4" rx="2" fill="#1e293b" />
      <rect x="0" y="32" width="58" height="4" rx="2" fill="#00f5d4" filter="url(#glow-cyan)" />
    </g>

    <!-- Right Metric 3: UPTIME -->
    <g transform="translate(230, 190)">
      <text x="65" y="10" class="hud-title" text-anchor="end">UPTIME</text>
      <text x="65" y="26" class="hud-value" text-anchor="end">99.98%</text>
      <rect x="0" y="32" width="65" height="4" rx="2" fill="#1e293b" />
      <rect x="0" y="32" width="64" height="4" rx="2" fill="#38bdf8" filter="url(#glow-blue)" />
    </g>
  </g>
</svg>
