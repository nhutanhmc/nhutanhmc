<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 190" width="100%" height="100%">
  <defs>
    <!-- Intense Glow Filters -->
    <filter id="glow-cyan" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3.5" result="blur1" />
      <feGaussianBlur stdDeviation="7" result="blur2" />
      <feMerge>
        <feMergeNode in="blur2" />
        <feMergeNode in="blur1" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="glow-magenta" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3.5" result="blur1" />
      <feGaussianBlur stdDeviation="7" result="blur2" />
      <feMerge>
        <feMergeNode in="blur2" />
        <feMergeNode in="blur1" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="glow-blue" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur1" />
      <feGaussianBlur stdDeviation="8" result="blur2" />
      <feMerge>
        <feMergeNode in="blur2" />
        <feMergeNode in="blur1" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Translucent glass deck gradient -->
    <linearGradient id="deck-glass" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#020516" stop-opacity="0.94"/>
      <stop offset="100%" stop-color="#010206" stop-opacity="0.98"/>
    </linearGradient>
  </defs>

  <style>
    /* CSS animations */
    @keyframes spin-cw {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    @keyframes blink {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 1; }
    }
    @keyframes progress-head-pulse {
      0%, 100% { r: 3.5px; opacity: 0.7; }
      50% { r: 5.5px; opacity: 1; filter: drop-shadow(0 0 6px #ff007f); }
    }

    /* Equalizer Bar bounce cycles */
    @keyframes eq-b-1 { 0%, 100% { height: 10px; y: 130px; } 50% { height: 50px; y: 90px; } }
    @keyframes eq-b-2 { 0%, 100% { height: 40px; y: 100px; } 50% { height: 70px; y: 70px; } }
    @keyframes eq-b-3 { 0%, 100% { height: 65px; y: 75px; } 50% { height: 20px; y: 120px; } }
    @keyframes eq-b-4 { 0%, 100% { height: 15px; y: 125px; } 50% { height: 85px; y: 55px; } }
    @keyframes eq-b-5 { 0%, 100% { height: 45px; y: 95px; } 50% { height: 30px; y: 110px; } }
    @keyframes eq-b-6 { 0%, 100% { height: 75px; y: 65px; } 50% { height: 40px; y: 100px; } }
    @keyframes eq-b-7 { 0%, 100% { height: 25px; y: 115px; } 50% { height: 60px; y: 80px; } }
    @keyframes eq-b-8 { 0%, 100% { height: 55px; y: 85px; } 50% { height: 80px; y: 60px; } }
    @keyframes eq-b-9 { 0%, 100% { height: 35px; y: 105px; } 50% { height: 15px; y: 125px; } }
    @keyframes eq-b-10 { 0%, 100% { height: 15px; y: 125px; } 50% { height: 75px; y: 65px; } }
    @keyframes eq-b-11 { 0%, 100% { height: 60px; y: 80px; } 50% { height: 25px; y: 115px; } }
    @keyframes eq-b-12 { 0%, 100% { height: 20px; y: 120px; } 50% { height: 50px; y: 90px; } }

    /* Applied classes */
    .spin-disc { transform-origin: 75px 95px; animation: spin-cw 5.5s linear infinite; }
    .blink { animation: blink 2.5s infinite ease-in-out; }
    .progress-point { animation: progress-head-pulse 2s infinite ease-in-out; }

    /* Equalizer classes */
    .bar-1 { animation: eq-b-1 1.2s infinite ease-in-out; }
    .bar-2 { animation: eq-b-2 0.8s infinite ease-in-out; }
    .bar-3 { animation: eq-b-3 1.5s infinite ease-in-out; }
    .bar-4 { animation: eq-b-4 0.9s infinite ease-in-out; }
    .bar-5 { animation: eq-b-5 1.1s infinite ease-in-out; }
    .bar-6 { animation: eq-b-6 1.4s infinite ease-in-out; }
    .bar-7 { animation: eq-b-7 1.0s infinite ease-in-out; }
    .bar-8 { animation: eq-b-8 0.7s infinite ease-in-out; }
    .bar-9 { animation: eq-b-9 1.3s infinite ease-in-out; }
    .bar-10 { animation: eq-b-10 1.1s infinite ease-in-out; }
    .bar-11 { animation: eq-b-11 1.4s infinite ease-in-out; }
    .bar-12 { animation: eq-b-12 0.8s infinite ease-in-out; }

    /* Typography */
    .song-title { font-family: 'Courier New', Courier, monospace; font-size: 11.5px; font-weight: bold; fill: #00f5d4; filter: url(#glow-cyan); }
    .song-artist { font-family: 'Courier New', Courier, monospace; font-size: 10px; fill: #8fa0c5; }
    .time-stamp { font-family: 'Courier New', monospace; font-size: 9px; fill: #0077b6; font-weight: bold; }
    .panel-header-text { font-family: 'Courier New', monospace; font-size: 10px; font-weight: bold; fill: #52638c; letter-spacing: 1px; }
  </style>

  <!-- Player Deck Card -->
  <rect width="600" height="190" rx="12" fill="url(#deck-glass)" stroke="#0077b6" stroke-width="1.5" stroke-opacity="0.6" filter="url(#glow-blue)" />

  <!-- Top Chrome Header Status -->
  <path d="M0,12 Q0,0 12,0 L588,0 Q600,0 600,12 L600,28 L0,28 Z" fill="#010410" />
  <circle cx="20" cy="14" r="4" fill="#ef4444" />
  <circle cx="32" cy="14" r="4" fill="#eab308" />
  <circle cx="44" cy="14" r="4" fill="#22c55e" />
  <text x="300" y="18" class="panel-header-text" text-anchor="middle">LOFI_DECK_CONTROLLER_v2.sys</text>
  <circle cx="580" cy="14" r="3.5" fill="#ff007f" class="blink" filter="url(#glow-magenta)" />
  
  <line x1="0" y1="28" x2="600" y2="28" stroke="#0077b6" stroke-width="1" stroke-opacity="0.4" />

  <!-- Corner Brackets overlay -->
  <path d="M12,40 L12,34 L18,34" fill="none" stroke="#00f5d4" stroke-width="1.5" stroke-opacity="0.8" filter="url(#glow-cyan)" />
  <path d="M588,40 L588,34 L582,34" fill="none" stroke="#00f5d4" stroke-width="1.5" stroke-opacity="0.8" filter="url(#glow-cyan)" />
  <path d="M12,178 L12,184 L18,184" fill="none" stroke="#00f5d4" stroke-width="1.5" stroke-opacity="0.8" filter="url(#glow-cyan)" />
  <path d="M588,178 L588,184 L582,184" fill="none" stroke="#00f5d4" stroke-width="1.5" stroke-opacity="0.8" filter="url(#glow-cyan)" />

  <!-- === LEFT: ROTATING AUDIO DISC === -->
  <g class="spin-disc">
    <!-- Vinyl Grooves -->
    <circle cx="75" cy="95" r="48" fill="#020512" stroke="#0077b6" stroke-width="1" stroke-opacity="0.5" />
    <circle cx="75" cy="95" r="40" fill="none" stroke="#0077b6" stroke-width="0.5" stroke-opacity="0.3" />
    <circle cx="75" cy="95" r="32" fill="none" stroke="#ff007f" stroke-width="0.8" stroke-opacity="0.5" filter="url(#glow-magenta)" />
    <circle cx="75" cy="95" r="24" fill="none" stroke="#00f5d4" stroke-width="1.2" stroke-opacity="0.6" stroke-dasharray="10 6" filter="url(#glow-cyan)" />
    
    <!-- Central labels -->
    <circle cx="75" cy="95" r="10" fill="#02081a" stroke="#00b4d8" stroke-width="1.5" />
    <circle cx="75" cy="95" r="3.5" fill="#ffffff" filter="url(#glow-cyan)" />
    
    <!-- Needle Sweep link -->
    <line x1="75" y1="95" x2="115" y2="95" stroke="#ff007f" stroke-width="1.5" filter="url(#glow-magenta)" />
  </g>
  
  <!-- Outer tone-arm tracker -->
  <path d="M 125,55 L 115,55 L 115,75 L 105,87" fill="none" stroke="#0077b6" stroke-width="1.5" stroke-opacity="0.8" />
  <circle cx="125" cy="55" r="2.5" fill="#0077b6" />

  <!-- === CENTER: METADATA & PROGRESS BAR === -->
  <g transform="translate(145, 48)">
    <text x="0" y="10" font-family="monospace" font-size="8.5" fill="#0077b6" font-weight="bold">LOFI AUDIO PROTOCOL : ACTIVE</text>
    
    <!-- Song metadata info -->
    <text x="0" y="27" class="song-title">CYBERNETIC_SYMPHONY_V2.flac</text>
    <text x="0" y="42" class="song-artist">nhutanhmc.sh [Xavia]</text>
    
    <!-- Timeline progress bar -->
    <!-- Track background line -->
    <line x1="0" y1="62" x2="230" y2="62" stroke="#010a24" stroke-width="4.5" stroke-linecap="round" />
    <!-- Active timeline indicator -->
    <line x1="0" y1="62" x2="140" y2="62" stroke="#ff007f" stroke-width="4.5" stroke-linecap="round" filter="url(#glow-magenta)" />
    <!-- Glowing pulse point -->
    <circle cx="140" cy="62" r="4.5" fill="#ffffff" class="progress-point" filter="url(#glow-cyan)" />

    <!-- Duration Stamps -->
    <text x="0" y="78" class="time-stamp">03:42</text>
    <text x="230" y="78" class="time-stamp" text-anchor="end">07:12</text>

    <!-- Console Player media keys -->
    <g transform="translate(60, 88)" stroke="#00b4d8" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <!-- Shuffle -->
      <path d="M0,5 L10,5 L20,15 L30,15 M0,15 L10,15 L20,5 L30,5" stroke-width="1" />
      
      <!-- Rewind -->
      <path d="M45,5 L45,15 M55,5 L48,10 L55,15" fill="#00b4d8" fill-opacity="0.35" />
      
      <!-- Glowing Play/Pause key -->
      <g stroke="#ff007f" filter="url(#glow-magenta)" fill="#ff007f" fill-opacity="0.4">
        <circle cx="75" cy="10" r="10.5" fill="none" stroke-width="1.5" />
        <polygon points="72,6 80,10 72,14" />
      </g>
      
      <!-- Forward -->
      <path d="M105,5 L98,10 L105,15 M95,5 L95,15" fill="#00b4d8" fill-opacity="0.35" />
      
      <!-- Repeat -->
      <path d="M120,8 L130,8 A 3,3 0 0,1 133,11 L133,12 A 3,3 0 0,1 130,15 L120,15" stroke-width="1" />
      <polygon points="120,5 116,8 120,11" stroke-width="1" fill="#00b4d8" />
    </g>
  </g>

  <!-- Vertical separator line -->
  <line x1="395" y1="40" x2="395" y2="175" stroke="#0077b6" stroke-width="1" stroke-opacity="0.3" stroke-dasharray="3 3" />

  <!-- === RIGHT: 12-BAND GRAPHIC EQUALIZER === -->
  <!-- Audio response board frame -->
  <rect x="410" y="45" width="168" height="96" fill="#010410" stroke="#0077b6" stroke-width="1" stroke-opacity="0.3" />
  
  <!-- Equalizer column bars (Alternating Cyan & Magenta) -->
  <g stroke="none" fill-opacity="0.8">
    <rect x="415" y="130" width="8" height="10" class="bar-1" rx="1.5" fill="#00f5d4" filter="url(#glow-cyan)" />
    <rect x="428" y="100" width="8" height="40" class="bar-2" rx="1.5" fill="#ff007f" filter="url(#glow-magenta)" />
    <rect x="441" y="75" width="8" height="65" class="bar-3" rx="1.5" fill="#00f5d4" filter="url(#glow-cyan)" />
    <rect x="454" y="125" width="8" height="15" class="bar-4" rx="1.5" fill="#ff007f" filter="url(#glow-magenta)" />
    <rect x="467" y="95" width="8" height="45" class="bar-5" rx="1.5" fill="#00f5d4" filter="url(#glow-cyan)" />
    <rect x="480" y="65" width="8" height="75" class="bar-6" rx="1.5" fill="#ff007f" filter="url(#glow-magenta)" />
    <rect x="493" y="115" width="8" height="25" class="bar-7" rx="1.5" fill="#00f5d4" filter="url(#glow-cyan)" />
    <rect x="506" y="85" width="8" height="55" class="bar-8" rx="1.5" fill="#ff007f" filter="url(#glow-magenta)" />
    <rect x="519" y="105" width="8" height="35" class="bar-9" rx="1.5" fill="#00f5d4" filter="url(#glow-cyan)" />
    <rect x="532" y="125" width="8" height="15" class="bar-10" rx="1.5" fill="#ff007f" filter="url(#glow-magenta)" />
    <rect x="545" y="80" width="8" height="60" class="bar-11" rx="1.5" fill="#00f5d4" filter="url(#glow-cyan)" />
    <rect x="558" y="120" width="8" height="20" class="bar-12" rx="1.5" fill="#ff007f" filter="url(#glow-magenta)" />
  </g>

  <!-- Equalizer frequency response label -->
  <text x="494" y="156" font-family="monospace" font-size="8.5" fill="#8fa0c5" text-anchor="middle" font-weight="bold">DECK OUTPUT: 44.1 KHZ</text>

  <!-- Deck controls footer -->
  <text x="578" y="174" font-family="monospace" font-size="8" fill="#ff007f" font-weight="bold" text-anchor="end" class="blink" filter="url(#glow-magenta)">DECK: ONLINE</text>
  <text x="410" y="174" font-family="monospace" font-size="8" fill="#0077b6" font-weight="bold">GAIN: +0.6 DB [80%]</text>
</svg>
