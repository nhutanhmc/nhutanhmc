<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 180" width="100%" height="100%">
  <defs>
    <!-- Intense Glow Filters -->
    <filter id="glow-cyan" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3.5" result="blur1" />
      <feGaussianBlur stdDeviation="7" result="blur2" />
      <feMerge>
        <feMergeNode in="blur2" />
        <feMergeNode in="blur1" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="glow-blue" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur1" />
      <feGaussianBlur stdDeviation="8" result="blur2" />
      <feMerge>
        <feMergeNode in="blur2" />
        <feMergeNode in="blur1" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Glassmorphism Card Gradient -->
    <linearGradient id="deck-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#02081c" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#01030a" stop-opacity="0.98"/>
    </linearGradient>
  </defs>

  <style>
    /* CSS Animations */
    @keyframes spin-cw {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    @keyframes blink {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 1; filter: drop-shadow(0 0 5px #00f5d4); }
    }
    @keyframes progress-pulse {
      0%, 100% { r: 3.5px; opacity: 0.7; }
      50% { r: 5.5px; opacity: 1; filter: drop-shadow(0 0 6px #00f5d4); }
    }
    
    /* Equalizer Bar bounce cycles */
    @keyframes bounce-bar-1 { 0%, 100% { height: 10px; y: 120px; } 50% { height: 55px; y: 75px; } }
    @keyframes bounce-bar-2 { 0%, 100% { height: 35px; y: 95px; } 50% { height: 75px; y: 55px; } }
    @keyframes bounce-bar-3 { 0%, 100% { height: 60px; y: 70px; } 50% { height: 20px; y: 110px; } }
    @keyframes bounce-bar-4 { 0%, 100% { height: 15px; y: 115px; } 50% { height: 85px; y: 45px; } }
    @keyframes bounce-bar-5 { 0%, 100% { height: 45px; y: 85px; } 50% { height: 30px; y: 100px; } }
    @keyframes bounce-bar-6 { 0%, 100% { height: 70px; y: 60px; } 50% { height: 40px; y: 90px; } }
    @keyframes bounce-bar-7 { 0%, 100% { height: 20px; y: 110px; } 50% { height: 65px; y: 65px; } }
    @keyframes bounce-bar-8 { 0%, 100% { height: 50px; y: 80px; } 50% { height: 80px; y: 50px; } }
    @keyframes bounce-bar-9 { 0%, 100% { height: 30px; y: 100px; } 50% { height: 15px; y: 115px; } }
    @keyframes bounce-bar-10 { 0%, 100% { height: 10px; y: 120px; } 50% { height: 50px; y: 80px; } }

    /* Class applications */
    .spin-vinyl { transform-origin: 75px 90px; animation: spin-cw 6s linear infinite; }
    .blink { animation: blink 2.5s infinite ease-in-out; }
    .progress-point { animation: progress-pulse 2s infinite ease-in-out; }

    /* Equalizer Classes */
    .eq-1 { animation: bounce-bar-1 1.2s infinite ease-in-out; }
    .eq-2 { animation: bounce-bar-2 0.8s infinite ease-in-out; }
    .eq-3 { animation: bounce-bar-3 1.5s infinite ease-in-out; }
    .eq-4 { animation: bounce-bar-4 0.9s infinite ease-in-out; }
    .eq-5 { animation: bounce-bar-5 1.1s infinite ease-in-out; }
    .eq-6 { animation: bounce-bar-6 1.4s infinite ease-in-out; }
    .eq-7 { animation: bounce-bar-7 1.0s infinite ease-in-out; }
    .eq-8 { animation: bounce-bar-8 0.7s infinite ease-in-out; }
    .eq-9 { animation: bounce-bar-9 1.3s infinite ease-in-out; }
    .eq-10 { animation: bounce-bar-10 1.1s infinite ease-in-out; }

    /* Typography */
    .song-title { font-family: 'Courier New', Courier, monospace; font-size: 11px; font-weight: bold; fill: #00f5d4; filter: url(#glow-cyan); }
    .song-artist { font-family: 'Courier New', Courier, monospace; font-size: 10px; fill: #8fa0c5; }
    .time-stamp { font-family: 'Courier New', monospace; font-size: 9px; fill: #0077b6; font-weight: bold; }
    .hud-header { font-family: 'Courier New', monospace; font-size: 10px; font-weight: bold; fill: #475569; letter-spacing: 1px; }
  </style>

  <!-- Player Frame -->
  <rect width="600" height="180" rx="12" fill="url(#deck-grad)" stroke="#0077b6" stroke-width="1.5" stroke-opacity="0.6" filter="url(#glow-blue)" />

  <!-- Top bar status -->
  <path d="M0,12 Q0,0 12,0 L588,0 Q600,0 600,12 L600,28 L0,28 Z" fill="#010410" />
  <circle cx="20" cy="14" r="4" fill="#ef4444" />
  <circle cx="32" cy="14" r="4" fill="#eab308" />
  <circle cx="44" cy="14" r="4" fill="#22c55e" />
  <text x="300" y="18" class="hud-header" text-anchor="middle">AUDIO_PROTOCOL_CONSOLE.sh</text>
  <circle cx="580" cy="14" r="3.5" fill="#00f5d4" class="blink" />
  
  <line x1="0" y1="28" x2="600" y2="28" stroke="#0077b6" stroke-width="1" stroke-opacity="0.4" />

  <!-- Corner Brackets overlay -->
  <path d="M10,38 L10,34 L14,34" fill="none" stroke="#00f5d4" stroke-width="1.5" stroke-opacity="0.8" filter="url(#glow-cyan)" />
  <path d="M590,38 L590,34 L586,34" fill="none" stroke="#00f5d4" stroke-width="1.5" stroke-opacity="0.8" filter="url(#glow-cyan)" />
  <path d="M10,168 L10,172 L14,172" fill="none" stroke="#00f5d4" stroke-width="1.5" stroke-opacity="0.8" filter="url(#glow-cyan)" />
  <path d="M590,168 L590,172 L586,172" fill="none" stroke="#00f5d4" stroke-width="1.5" stroke-opacity="0.8" filter="url(#glow-cyan)" />

  <!-- === LEFT: ROTATING NEON DISC === -->
  <g class="spin-vinyl">
    <!-- Vinyl Groove lines -->
    <circle cx="75" cy="90" r="48" fill="#020512" stroke="#0077b6" stroke-width="1" stroke-opacity="0.5" />
    <circle cx="75" cy="90" r="40" fill="none" stroke="#0077b6" stroke-width="0.5" stroke-opacity="0.3" />
    <circle cx="75" cy="90" r="32" fill="none" stroke="#00b4d8" stroke-width="0.7" stroke-opacity="0.4" />
    <circle cx="75" cy="90" r="24" fill="none" stroke="#00f5d4" stroke-width="1" stroke-opacity="0.6" stroke-dasharray="8 6" filter="url(#glow-cyan)" />
    
    <!-- Center Label -->
    <circle cx="75" cy="90" r="10" fill="#02081a" stroke="#00b4d8" stroke-width="1.5" />
    <circle cx="75" cy="90" r="3" fill="#ffffff" filter="url(#glow-cyan)" />
    
    <!-- Stylized visualizer needle/line sweep on vinyl -->
    <line x1="75" y1="90" x2="115" y2="90" stroke="#00f5d4" stroke-width="1.5" filter="url(#glow-cyan)" />
  </g>
  
  <!-- Outer tone-arm HUD indicator -->
  <path d="M 125,50 L 115,50 L 115,70 L 105,82" fill="none" stroke="#0077b6" stroke-width="1.5" stroke-opacity="0.8" />
  <circle cx="125" cy="50" r="2.5" fill="#0077b6" />

  <!-- === CENTER: METADATA & PROGRESS BAR === -->
  <g transform="translate(145, 45)">
    <!-- Active Status -->
    <text x="0" y="10" font-family="monospace" font-size="8" fill="#0077b6" font-weight="bold">DECK STATUS: PLAYING</text>
    
    <!-- Song details -->
    <text x="0" y="27" class="song-title">CYBERNETIC_SYMPHONY.flac</text>
    <text x="0" y="42" class="song-artist">nhutanhmc.sh [Xavia]</text>
    
    <!-- Progress Bar -->
    <!-- Total timeline track -->
    <line x1="0" y1="60" x2="230" y2="60" stroke="#010a24" stroke-width="4.5" stroke-linecap="round" />
    <!-- Active progress track -->
    <line x1="0" y1="60" x2="135" y2="60" stroke="#00b4d8" stroke-width="4.5" stroke-linecap="round" filter="url(#glow-blue)" />
    <!-- Pulsing progress head -->
    <circle cx="135" cy="60" r="4.5" fill="#ffffff" class="progress-point" filter="url(#glow-cyan)" />

    <!-- Time Stamps -->
    <text x="0" y="75" class="time-stamp">03:42</text>
    <text x="230" y="75" class="time-stamp" text-anchor="end">07:12</text>

    <!-- Deck Media Controls (Vector drawing) -->
    <g transform="translate(60, 85)" stroke="#00b4d8" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <!-- Shuffle -->
      <path d="M0,5 L10,5 L20,15 L30,15 M0,15 L10,15 L20,5 L30,5" stroke-width="1" />
      
      <!-- Prev -->
      <path d="M45,5 L45,15 M55,5 L48,10 L55,15" fill="#00b4d8" fill-opacity="0.3" />
      
      <!-- Play/Pause (Glowing) -->
      <g stroke="#00f5d4" filter="url(#glow-cyan)" fill="#00f5d4" fill-opacity="0.4">
        <!-- Play circle -->
        <circle cx="75" cy="10" r="10" fill="none" stroke-width="1.5" />
        <!-- Play arrow triangle -->
        <polygon points="72,6 80,10 72,14" />
      </g>
      
      <!-- Next -->
      <path d="M105,5 L98,10 L105,15 M95,5 L95,15" fill="#00b4d8" fill-opacity="0.3" />
      
      <!-- Repeat -->
      <path d="M120,8 L130,8 A 3,3 0 0,1 133,11 L133,12 A 3,3 0 0,1 130,15 L120,15" stroke-width="1" />
      <polygon points="120,5 116,8 120,11" stroke-width="1" fill="#00b4d8" />
    </g>
  </g>

  <!-- Vertical separator -->
  <line x1="395" y1="40" x2="395" y2="165" stroke="#0077b6" stroke-width="1" stroke-opacity="0.3" stroke-dasharray="3 3" />

  <!-- === RIGHT: 10-BAND GRAPHIC EQUALIZER === -->
  <!-- Equalizer Box Framework -->
  <rect x="410" y="45" width="168" height="90" fill="#010410" stroke="#0077b6" stroke-width="1" stroke-opacity="0.3" />
  
  <g fill="#00f5d4" stroke="none" filter="url(#glow-cyan)" fill-opacity="0.8">
    <rect x="418" y="120" width="10" height="10" class="eq-1" rx="1.5" />
    <rect x="433" y="95" width="10" height="35" class="eq-2" rx="1.5" fill="#00b4d8" />
    <rect x="448" y="70" width="10" height="60" class="eq-3" rx="1.5" />
    <rect x="463" y="115" width="10" height="15" class="eq-4" rx="1.5" fill="#00b4d8" />
    <rect x="478" y="85" width="10" height="45" class="eq-5" rx="1.5" />
    <rect x="493" y="60" width="10" height="70" class="eq-6" rx="1.5" fill="#00b4d8" />
    <rect x="508" y="110" width="10" height="20" class="eq-7" rx="1.5" />
    <rect x="523" y="80" width="10" height="50" class="eq-8" rx="1.5" fill="#00b4d8" />
    <rect x="538" y="100" width="10" height="30" class="eq-9" rx="1.5" />
    <rect x="553" y="120" width="10" height="10" class="eq-10" rx="1.5" fill="#00b4d8" />
  </g>

  <!-- Equalizer baseline HUD readout -->
  <text x="494" y="152" font-family="monospace" font-size="8" fill="#8fa0c5" text-anchor="middle" font-weight="bold">FREQ RESPONSE: 44.1 KHZ</text>

  <!-- Audio Deck Status Readout -->
  <text x="578" y="165" font-family="monospace" font-size="8" fill="#ff2a6d" font-weight="bold" text-anchor="end" class="blink">MONITOR: ON</text>
  <text x="410" y="165" font-family="monospace" font-size="8" fill="#0077b6" font-weight="bold">VOL_GAIN: +0.6 DB [80%]</text>
</svg>
