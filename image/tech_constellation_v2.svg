<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500" width="100%" height="100%">
  <defs>
    <!-- Cyan, Magenta, and Blue Glow Filters -->
    <filter id="glow-cyan" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="4" result="blur1" />
      <feGaussianBlur stdDeviation="8" result="blur2" />
      <feMerge>
        <feMergeNode in="blur2" />
        <feMergeNode in="blur1" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="glow-magenta" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="4" result="blur1" />
      <feGaussianBlur stdDeviation="8" result="blur2" />
      <feMerge>
        <feMergeNode in="blur2" />
        <feMergeNode in="blur1" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="glow-blue" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="5" result="blur1" />
      <feGaussianBlur stdDeviation="10" result="blur2" />
      <feMerge>
        <feMergeNode in="blur2" />
        <feMergeNode in="blur1" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Background Space Glow -->
    <radialGradient id="bg-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0a1b3a" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#010204" stop-opacity="0"/>
    </radialGradient>
    
    <!-- Central Core Energy -->
    <radialGradient id="core-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff007f" stop-opacity="0.9"/>
      <stop offset="50%" stop-color="#00f5d4" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#010205" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <style>
    /* CSS animations */
    @keyframes float-hologram {
      0% { transform: translateY(0px) rotateX(20deg); }
      50% { transform: translateY(-10px) rotateX(20deg); }
      100% { transform: translateY(0px) rotateX(20deg); }
    }
    @keyframes data-flow-dash {
      to { stroke-dashoffset: -40; }
    }
    @keyframes pulse-core {
      0%, 100% { transform: scale(1); opacity: 0.9; }
      50% { transform: scale(1.15); opacity: 1; filter: drop-shadow(0 0 10px #ff007f); }
    }
    @keyframes spin-gear-cw {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    @keyframes spin-gear-ccw {
      0% { transform: rotate(360deg); }
      100% { transform: rotate(0deg); }
    }
    @keyframes blink {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 1; }
    }

    /* Animation Classes */
    .float-hologram-deck {
      transform-style: preserve-3d;
      perspective: 800px;
      transform: rotateX(20deg);
      animation: float-hologram 6s ease-in-out infinite;
      transform-origin: 500px 250px;
    }
    .data-link { stroke-dasharray: 8 8; animation: data-flow-dash 2s linear infinite; }
    .pulse-core { animation: pulse-core 3s ease-in-out infinite; transform-origin: 500px 250px; }
    .rotate-cw { transform-origin: 500px 250px; animation: spin-gear-cw 25s linear infinite; }
    .rotate-ccw { transform-origin: 500px 250px; animation: spin-gear-ccw 15s linear infinite; }
    .blink { animation: blink 2.5s infinite ease-in-out; }

    /* Node hover styles */
    .const-node { cursor: pointer; transition: all 0.3s ease; }
    .const-node:hover { filter: brightness(1.3) drop-shadow(0 0 12px #00f5d4); }
  </style>

  <!-- Solid Canvas Background -->
  <rect width="1000" height="500" rx="16" fill="#010204" stroke="#0e172a" stroke-width="2.5" />
  <circle cx="500" cy="250" r="450" fill="url(#bg-glow)" />

  <!-- === HUD GRID BACKGROUND WITH COORDINATE RULERS === -->
  <g stroke="#ffffff" stroke-opacity="0.04" stroke-width="1">
    <line x1="50" y1="250" x2="950" y2="250" />
    <line x1="500" y1="50" x2="500" y2="450" />
    <circle cx="500" cy="250" r="180" fill="none" />
    <circle cx="500" cy="250" r="320" fill="none" />
  </g>

  <!-- Left Coordinate Ruler Y Axis -->
  <g stroke="#0077b6" stroke-opacity="0.3" stroke-width="1.2">
    <line x1="75" y1="80" x2="75" y2="420" />
    <!-- Ticks -->
    <line x1="70" y1="100" x2="75" y2="100" />
    <line x1="70" y1="150" x2="75" y2="150" />
    <line x1="70" y1="200" x2="75" y2="200" />
    <line x1="70" y1="250" x2="75" y2="250" />
    <line x1="70" y1="300" x2="75" y2="300" />
    <line x1="70" y1="350" x2="75" y2="350" />
    <line x1="70" y1="400" x2="75" y2="400" />
  </g>
  <g font-family="monospace" font-size="8" fill="#0077b6" font-weight="bold">
    <text x="62" y="103">4.0</text>
    <text x="62" y="153">3.0</text>
    <text x="62" y="203">2.0</text>
    <text x="62" y="253">1.0</text>
    <text x="62" y="303">0.0</text>
    <text x="62" y="353">-1.0</text>
    <text x="62" y="403">-2.0</text>
  </g>

  <!-- Bottom Coordinate Ruler X Axis -->
  <g stroke="#0077b6" stroke-opacity="0.3" stroke-width="1.2">
    <line x1="120" y1="440" x2="880" y2="440" />
    <!-- Ticks -->
    <line x1="150" y1="440" x2="150" y2="445" />
    <line x1="250" y1="440" x2="250" y2="445" />
    <line x1="350" y1="440" x2="350" y2="445" />
    <line x1="450" y1="440" x2="450" y2="445" />
    <line x1="550" y1="440" x2="550" y2="445" />
    <line x1="650" y1="440" x2="650" y2="445" />
    <line x1="750" y1="440" x2="750" y2="445" />
    <line x1="850" y1="440" x2="850" y2="445" />
  </g>
  <g font-family="monospace" font-size="8" fill="#0077b6" font-weight="bold" text-anchor="middle">
    <text x="150" y="455">120.0</text>
    <text x="250" y="455">240.0</text>
    <text x="350" y="455">360.0</text>
    <text x="450" y="455">480.0</text>
    <text x="550" y="455">600.0</text>
    <text x="650" y="455">720.0</text>
    <text x="750" y="455">840.0</text>
    <text x="850" y="455">960.0</text>
  </g>

  <!-- HUD Telemetry Data Markers -->
  <g font-family="monospace" font-size="9" fill="#0077b6" font-weight="bold">
    <text x="35" y="55">CONSTELLATION: v2.0</text>
    <text x="35" y="70">NODES ONLINE: 12</text>
    <text x="35" y="85">PERSPECTIVE: 3D_MATRIX</text>

    <text x="965" y="55" text-anchor="end">SYS_LINK: ACTIVE</text>
    <text x="965" y="70" text-anchor="end">MATRIX_SPEED: 10 Gbps</text>
    <text x="965" y="85" text-anchor="end">LATENCY_INDEX: SECURE</text>
  </g>

  <text x="500" y="45" font-family="monospace" font-size="12" font-weight="bold" fill="#00f5d4" text-anchor="middle" filter="url(#glow-cyan)" class="blink">3D CYBERNETIC TECH CONSTELLATION MAP</text>

  <!-- === float-hologram-deck Container (3D Projected Space) === -->
  <g class="float-hologram-deck">

    <!-- === NEURAL CIRCUIT LINKS === -->
    <!-- Base links (blue/navy) -->
    <g fill="none" stroke="#0077b6" stroke-width="1.5" stroke-opacity="0.4">
      <!-- Inner Core Links -->
      <line x1="500" y1="250" x2="380" y2="160" />
      <line x1="500" y1="250" x2="620" y2="160" />
      <line x1="500" y1="250" x2="300" y2="250" />
      <line x1="500" y1="250" x2="700" y2="250" />
      <line x1="500" y1="250" x2="380" y2="340" />
      <line x1="500" y1="250" x2="620" y2="340" />
      <line x1="500" y1="250" x2="500" y2="110" />
      <line x1="500" y1="250" x2="500" y2="390" />
      
      <!-- Hex Mesh Links -->
      <path d="M 500,110 L 620,160 L 700,250 L 620,340 L 500,390 L 380,340 L 300,250 L 380,160 Z" />
      
      <!-- Outer Orbit Links -->
      <line x1="300" y1="250" x2="230" y2="180" />
      <line x1="300" y1="250" x2="230" y2="320" />
      <line x1="700" y1="250" x2="770" y2="180" />
      <line x1="700" y1="250" x2="770" y2="320" />
    </g>

    <!-- Glowing Active Pulsing Data Links (Cyan and Magenta flows) -->
    <g fill="none" stroke-width="2" class="data-link" stroke-opacity="0.8">
      <!-- Cyan Flows -->
      <g stroke="#00f5d4" filter="url(#glow-cyan)">
        <line x1="500" y1="250" x2="380" y2="160" />
        <line x1="500" y1="250" x2="300" y2="250" />
        <line x1="500" y1="250" x2="380" y2="340" />
        <line x1="500" y1="250" x2="500" y2="110" />
        <path d="M 500,110 L 380,160 L 300,250 L 380,340 L 500,390" />
        <line x1="300" y1="250" x2="230" y2="180" />
        <line x1="300" y1="250" x2="230" y2="320" />
      </g>
      
      <!-- Magenta Flows -->
      <g stroke="#ff007f" filter="url(#glow-magenta)">
        <line x1="500" y1="250" x2="620" y2="160" />
        <line x1="500" y1="250" x2="700" y2="250" />
        <line x1="500" y1="250" x2="620" y2="340" />
        <line x1="500" y1="250" x2="500" y2="390" />
        <path d="M 500,110 L 620,160 L 700,250 L 620,340 L 500,390" />
        <line x1="700" y1="250" x2="770" y2="180" />
        <line x1="700" y1="250" x2="770" y2="320" />
      </g>
    </g>

    <!-- === CONSTELLATION NODES === -->

    <!-- CENTRAL REACTOR CORE -->
    <!-- Concentric Gear Dials -->
    <circle cx="500" cy="250" r="48" fill="none" stroke="#00b4d8" stroke-dasharray="12 6" stroke-width="2" class="rotate-cw" filter="url(#glow-blue)" />
    <circle cx="500" cy="250" r="56" fill="none" stroke="#ff007f" stroke-dasharray="4 10" stroke-width="1.8" class="rotate-ccw" filter="url(#glow-magenta)" />
    <!-- Pulsing Hub Core -->
    <g class="pulse-core">
      <circle cx="500" cy="250" r="22" fill="url(#core-glow)" />
      <circle cx="500" cy="250" r="10" fill="#ffffff" filter="url(#glow-cyan)" />
    </g>

    <!-- Inner Constellation Tech Hexagons -->

    <!-- JavaScript (Left top) -->
    <g transform="translate(380, 160)" class="const-node">
      <!-- Hexagon vector shell path -->
      <polygon points="0,-18 16,-9 16,9 0,18 -16,9 -16,-9" fill="#020512" stroke="#00f5d4" stroke-width="1.5" filter="url(#glow-cyan)" />
      <text y="3" font-family="'Courier New', monospace" font-size="10" font-weight="bold" fill="#ffffff" text-anchor="middle">JS</text>
    </g>

    <!-- TypeScript (Right top) -->
    <g transform="translate(620, 160)" class="const-node">
      <polygon points="0,-18 16,-9 16,9 0,18 -16,9 -16,-9" fill="#020512" stroke="#ff007f" stroke-width="1.5" filter="url(#glow-magenta)" />
      <text y="3" font-family="'Courier New', monospace" font-size="10" font-weight="bold" fill="#ffffff" text-anchor="middle">TS</text>
    </g>

    <!-- React.js (Left mid) -->
    <g transform="translate(300, 250)" class="const-node">
      <polygon points="0,-18 16,-9 16,9 0,18 -16,9 -16,-9" fill="#020512" stroke="#00f5d4" stroke-width="1.5" filter="url(#glow-cyan)" />
      <!-- Small React Symbol -->
      <ellipse rx="10" ry="4" fill="none" stroke="#00f5d4" stroke-width="1" transform="rotate(30)" />
      <ellipse rx="10" ry="4" fill="none" stroke="#00f5d4" stroke-width="1" transform="rotate(90)" />
      <ellipse rx="10" ry="4" fill="none" stroke="#00f5d4" stroke-width="1" transform="rotate(150)" />
    </g>

    <!-- Next.js (Right mid) -->
    <g transform="translate(700, 250)" class="const-node">
      <polygon points="0,-18 16,-9 16,9 0,18 -16,9 -16,-9" fill="#020512" stroke="#ff007f" stroke-width="1.5" filter="url(#glow-magenta)" />
      <text y="3" font-family="'Courier New', monospace" font-size="9" font-weight="bold" fill="#ffffff" text-anchor="middle">NEXT</text>
    </g>

    <!-- Node.js (Left bottom) -->
    <g transform="translate(380, 340)" class="const-node">
      <polygon points="0,-18 16,-9 16,9 0,18 -16,9 -16,-9" fill="#020512" stroke="#00f5d4" stroke-width="1.5" filter="url(#glow-cyan)" />
      <text y="3" font-family="'Courier New', monospace" font-size="9" font-weight="bold" fill="#ffffff" text-anchor="middle">NODE</text>
    </g>

    <!-- Flutter (Right bottom) -->
    <g transform="translate(620, 340)" class="const-node">
      <polygon points="0,-18 16,-9 16,9 0,18 -16,9 -16,-9" fill="#020512" stroke="#ff007f" stroke-width="1.5" filter="url(#glow-magenta)" />
      <!-- Chevrons -->
      <path d="M-6,-7 L2,1 L-6,9 M1,-7 L8,0 L2,6" fill="none" stroke="#ff007f" stroke-width="1.5" stroke-linecap="round" />
    </g>

    <!-- Docker (Top center) -->
    <g transform="translate(500, 110)" class="const-node">
      <polygon points="0,-18 16,-9 16,9 0,18 -16,9 -16,-9" fill="#020512" stroke="#ff007f" stroke-width="1.5" filter="url(#glow-magenta)" />
      <text y="3" font-family="'Courier New', monospace" font-size="9" font-weight="bold" fill="#ffffff" text-anchor="middle">DKR</text>
    </g>

    <!-- AWS (Bottom center) -->
    <g transform="translate(500, 390)" class="const-node">
      <polygon points="0,-18 16,-9 16,9 0,18 -16,9 -16,-9" fill="#020512" stroke="#00f5d4" stroke-width="1.5" filter="url(#glow-cyan)" />
      <text y="3" font-family="'Courier New', monospace" font-size="9" font-weight="bold" fill="#ffffff" text-anchor="middle">AWS</text>
    </g>


    <!-- Outer Satellite Constellation Leaves -->

    <!-- Supabase (Outer Top Left) -->
    <g transform="translate(230, 180)" class="const-node">
      <polygon points="0,-16 14,-8 14,8 0,16 -14,8 -14,-8" fill="#020512" stroke="#00f5d4" stroke-width="1.2" filter="url(#glow-cyan)" />
      <!-- Lightning bolt -->
      <path d="M-4,-7 L2,-7 L-2,0 L4,0 L-2,7 L0,-1 L-4,-1 Z" fill="none" stroke="#00f5d4" stroke-width="1.2" stroke-linejoin="round" />
    </g>

    <!-- GraphQL (Outer Bottom Left) -->
    <g transform="translate(230, 320)" class="const-node">
      <polygon points="0,-16 14,-8 14,8 0,16 -14,8 -14,-8" fill="#020512" stroke="#00f5d4" stroke-width="1.2" filter="url(#glow-cyan)" />
      <polygon points="0,-8 7,-4 7,4 0,8 -7,4 -7,-4" fill="none" stroke="#00f5d4" stroke-width="1" />
    </g>

    <!-- Firebase (Outer Top Right) -->
    <g transform="translate(770, 180)" class="const-node">
      <polygon points="0,-16 14,-8 14,8 0,16 -14,8 -14,-8" fill="#020512" stroke="#ff007f" stroke-width="1.2" filter="url(#glow-magenta)" />
      <!-- Flame -->
      <path d="M-5,6 L4,6 L-2,-7 L-6,1 Z" fill="none" stroke="#ff007f" stroke-width="1" stroke-linejoin="round" />
    </g>

    <!-- MongoDB (Outer Bottom Right) -->
    <g transform="translate(770, 320)" class="const-node">
      <polygon points="0,-16 14,-8 14,8 0,16 -14,8 -14,-8" fill="#020512" stroke="#ff007f" stroke-width="1.2" filter="url(#glow-magenta)" />
      <text y="3" font-family="'Courier New', monospace" font-size="8" font-weight="bold" fill="#ffffff" text-anchor="middle">MDB</text>
    </g>

  </g>
</svg>
